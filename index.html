/* ---- Pronunciation (Web Speech API — uses the device's Arabic voice) ---- */
function speak(text) {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices() || [];
    const v =
      voices.find((x) => x.lang && x.lang.toLowerCase().startsWith("ar-eg")) ||
      voices.find((x) => x.lang && x.lang.toLowerCase().startsWith("ar"));
    if (v) u.voice = v;
    u.lang = v ? v.lang : "ar-EG";
    u.rate = 0.82;
    window.speechSynthesis.speak(u);
  } catch {
    /* ignore */
  }
}

function Speaker({ text, size = 18, color = "#c02e80" }) {
  return (
    <button
      className="tap"
      aria-label="Play pronunciation"
      onClick={(e) => {
        e.stopPropagation();
        speak(text);
      }}
      style={{
        border: `1px solid ${color}66`,
        background: `${color}1f`,
        color,
        borderRadius: 999,
        width: size + 18,
        height: size + 18,
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        fontSize: size,
        cursor: "pointer",
        flexShrink: 0,
      }}
    >
      🔊
    </button>
  );
}

/* ---- Arabic alphabet with Egyptian pronunciation notes ---- */
const ZWJ = "\u200d";
const letterForms = (l) => ({
  iso: l,
  ini: l + ZWJ,
  med: ZWJ + l + ZWJ,
  fin: ZWJ + l,
});

/* ---- Time + dates ---- */
const HOUR = 3600000;
const DAY = 86400000;
const todayStr = () => new Date().toISOString().slice(0, 10);
const shiftDay = (s, n) => {
  const d = new Date(s + "T00:00:00Z");
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
};

/* ---- Arabic answer normalization (forgiving grading) ---- */
function normAr(s) {
  if (!s) return "";
  return s
    .replace(/[\u064B-\u0652\u0670]/g, "")
    .replace(/\u0640/g, "")
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ء/g, "")
    .replace(/[^\u0600-\u06FF ]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
function answerMatches(input, item) {
  const a = normAr(input);
  if (!a) return false;
  if (a === normAr(item.ar)) return true;
  return (item.alts || []).some((x) => normAr(x) === a);
}

/* ---- SRS stages (WaniKani-style) ---- */
const STAGE_MS = {
  1: 2 * HOUR,
  2: 4 * HOUR,
  3: 8 * HOUR,
  4: 23 * HOUR,
  5: 3 * DAY,
  6: 7 * DAY,
  7: 14 * DAY,
  8: 30 * DAY,
  9: Infinity,
};
function stageMeta(stage) {
  if (stage >= 9) return { group: "Burned", short: "Burned", color: "#444444" };
  if (stage >= 8) return { group: "Enlightened", short: "Enlightened", color: "#5d1742" };
  if (stage >= 7) return { group: "Master", short: "Master", color: "#801d5c" };
  if (stage >= 5) return { group: "Guru", short: "Guru " + (stage - 4), color: "#c02e80" };
  if (stage >= 1) return { group: "Apprentice", short: "Apprentice " + stage, color: "#cd81a9" };
  return { group: "Locked", short: "—", color: "#9c8a93" };
}
const STAGE_GROUPS = ["Apprentice", "Guru", "Master", "Enlightened", "Burned"];
function learnItem(now) {
  return { stage: 1, due: now + STAGE_MS[1], correct: 0, wrong: 0, recentWrong: 0, learnedAt: now };
}
function reviewSchedule(prog, correct, now) {
  let stage = prog ? prog.stage : 1;
  stage = correct ? Math.min(9, stage + 1) : Math.max(1, stage - (stage >= 5 ? 2 : 1));
  const ms = STAGE_MS[stage];
  return {
    stage,
    due: ms === Infinity ? Infinity : now + ms,
    lastReviewed: now,
    learnedAt: prog ? prog.learnedAt : now,
    correct: (prog ? prog.correct : 0) + (correct ? 1 : 0),
    wrong: (prog ? prog.wrong : 0) + (correct ? 0 : 1),
    recentWrong: correct ? 0 : (prog ? prog.recentWrong || 0 : 0) + 1,
  };
}
function isLeech(prog) {
  return !!prog && (prog.recentWrong || 0) >= 2;
}
function fmtUntil(due, now) {
  if (due === Infinity) return "burned";
  const d = due - now;
  if (d <= 0) return "now";
  if (d < HOUR) return Math.max(1, Math.round(d / 60000)) + "m";
  if (d < DAY) return Math.round(d / HOUR) + "h";
  return Math.round(d / DAY) + "d";
}

/* ===================== TYPED QUIZ (reused everywhere) ===================== */
function TypedQuiz({ items, mode, onGrade, onExit, title }) {
  const [queue] = useState(() => items);
  const [i, setI] = useState(0);
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState({ right: 0, total: 0 });
  const [leveled, setLeveled] = useState(null);
  const [done, setDone] = useState(items.length === 0);

  const item = queue[i];

  const submit = () => {
    if (feedback) {
      setFeedback(null);
      setAnswer("");
      if (i + 1 >= queue.length) setDone(true);
      else setI(i + 1);
      return;
    }
    const ok = answerMatches(answer, item);
    const lvl = onGrade(item.id, ok, mode);
    if (lvl) setLeveled(lvl);
    setFeedback(ok ? "correct" : "wrong");
    setScore((s) => ({ right: s.right + (ok ? 1 : 0), total: s.total + 1 }));
  };
  const giveUp = () => {
    if (feedback) return;
    const lvl = onGrade(item.id, false, mode);
    if (lvl) setLeveled(lvl);
    setFeedback("wrong");
    setScore((s) => ({ right: s.right, total: s.total + 1 }));
  };

  if (done) {
    const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>{items.length === 0 ? "🌙" : "🎉"}</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>{items.length === 0 ? "Nothing to quiz right now" : "All done!"}</div>
        {items.length > 0 && (
          <div style={{ color: T.textDim, fontSize: 14, marginTop: 8 }}>{score.right}/{score.total} correct · {acc}% accuracy</div>
        )}
        {leveled && (
          <div style={{ marginTop: 14, background: `${T.gold}14`, border: `1px solid ${T.gold}`, borderRadius: 14, padding: "12px 14px", color: T.gold, fontWeight: 700 }}>
            🎊 Level up! You reached Level {leveled} — new words unlocked.
          </div>
        )}
        <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 18, padding: 14, borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Back to home</button>
      </div>
    );
  }

  const correct = feedback === "correct";
  const wrong = feedback === "wrong";

  return (
    <div className="fade">
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.goldSoft, whiteSpace: "nowrap" }}>{title}</div>
        <div style={{ flex: 1, height: 4, background: T.line, borderRadius: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(i / queue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})`, transition: "width .3s ease" }} />
        </div>
        <div style={{ fontSize: 12, color: T.textDim }}>{score.right}/{score.total}</div>
      </div>

      <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 20, padding: "22px 18px", textAlign: "center", boxShadow: "0 12px 30px rgba(128,29,92,.08)" }}>
        <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>Type in Arabic · {item.type}</div>
        <div style={{ fontFamily: displayFont, fontSize: 24, color: T.text, marginTop: 8 }}>{item.en}</div>
      </div>

      <input
        value={answer}
        onChange={(e) => !feedback && setAnswer(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && submit()}
        placeholder="اكتب بالعربي…"
        dir="rtl"
        readOnly={!!feedback}
        style={{ width: "100%", marginTop: 12, padding: "14px 16px", borderRadius: 14, border: `2px solid ${correct ? T.green : wrong ? T.red : T.line}`, background: correct ? `${T.green}10` : wrong ? `${T.red}10` : T.panel, color: T.text, fontFamily: arFont, fontSize: 26, outline: "none", textAlign: "right" }}
      />

      {feedback && (
        <div className="fade" style={{ marginTop: 12, background: T.panel, border: `1px solid ${wrong ? T.red : T.green}`, borderRadius: 14, padding: "12px 14px", textAlign: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: wrong ? T.red : T.green }}>{correct ? "Correct!" : "Answer:"}</div>
          <div style={{ fontFamily: arFont, fontSize: 30, color: T.text, direction: "rtl", marginTop: 4 }}>{item.ar}</div>
          <div style={{ color: T.goldSoft, fontStyle: "italic", fontSize: 14 }}>{item.tr}</div>
          <div style={{ marginTop: 8 }}><Speaker text={item.ar} color={T.terra} /></div>
        </div>
      )}

      {!feedback && (
        <ArabicKeyboard
          onKey={(ch) => setAnswer((a) => a + ch)}
          onSpace={() => setAnswer((a) => a + " ")}
          onBack={() => setAnswer((a) => a.slice(0, -1))}
          onClear={() => setAnswer("")}
        />
      )}

      <button className="tap" onClick={submit} style={{ width: "100%", marginTop: 12, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}>
        {feedback ? (i + 1 >= queue.length ? "Finish" : "Next →") : "Check answer"}
      </button>
      {!feedback && (
        <button className="tap" onClick={giveUp} style={{ width: "100%", marginTop: 8, padding: 11, borderRadius: 12, border: `1px solid ${T.line}`, background: "transparent", color: T.textDim, fontSize: 13, fontWeight: 600 }}>
          I don't know — show me
        </button>
      )}
      <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 8, padding: 9, borderRadius: 12, border: "none", background: "transparent", color: T.textDim, fontSize: 12 }}>
        End session
      </button>
      <div style={{ textAlign: "center", fontSize: 11, color: T.textDim, marginTop: 10, lineHeight: 1.6 }}>
        Use the keys above, or your phone's Arabic keyboard. Short vowels and hamza spelling don't need to be perfect.
      </div>
    </div>
  );
}

/* ===================== LEARN SESSION (teach N, then quiz them) ===================== */
function LearnSession({ pool, batch, onLearn, onGrade, onExit }) {
  const [queue] = useState(() => pool.slice(0, batch));
  const [phase, setPhase] = useState(queue.length ? "teach" : "empty");
  const [i, setI] = useState(0);

  if (phase === "empty") {
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "44px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>🌱</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>No new words right now</div>
        <div style={{ color: T.textDim, fontSize: 13.5, marginTop: 8, lineHeight: 1.6 }}>
          You've learned everything unlocked so far. Master your current level in Reviews (reach Guru on 90%) to unlock the next set.
        </div>
        <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 18, padding: 13, borderRadius: 12, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Home</button>
      </div>
    );
  }

  if (phase === "quiz") {
    return (
      <div>
        <div style={{ textAlign: "center", fontSize: 12.5, color: T.textDim, margin: "0 0 12px", lineHeight: 1.5 }}>
          Now type each one in Arabic to lock it in 👇
        </div>
        <TypedQuiz items={queue} mode="srs" onGrade={onGrade} onExit={onExit} title="Lesson quiz" />
      </div>
    );
  }

  // teach phase
  const item = queue[i];
  return (
    <div className="fade">
      <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
        <div style={{ height: "100%", width: `${(i / queue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})` }} />
      </div>
      <div className="pop" key={item.id} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "30px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)" }}>
        <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>New {item.type} · Level {item.level}</div>
        <div style={{ fontFamily: arFont, fontSize: item.type === "sentence" ? 32 : 48, color: T.text, direction: "rtl", margin: "14px 0", lineHeight: 1.4 }}>{item.ar}</div>
        <div style={{ color: T.goldSoft, fontStyle: "italic", fontSize: 16 }}>{item.tr}</div>
        <div style={{ fontFamily: displayFont, fontSize: 20, marginTop: 6 }}>{item.en}</div>
        <div style={{ marginTop: 14 }}><Speaker text={item.ar} size={20} color={T.gold} /></div>
      </div>
      <button
        className="tap"
        onClick={() => {
          onLearn(item.id);
          if (i + 1 >= queue.length) setPhase("quiz");
          else setI(i + 1);
        }}
        style={{ width: "100%", marginTop: 14, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}
      >
        {i + 1 >= queue.length ? "Got them — start quiz →" : "Learn it ✓"}
      </button>
      <div style={{ textAlign: "center", fontSize: 12, color: T.textDim, marginTop: 10 }}>Learning {i + 1} of {queue.length}</div>
    </div>
  );
}

/* ===================== ITEMS (browse + select-to-quiz + add) ===================== */
function ItemsView({ allItems, state, level, leeches, onAdd, onStartPractice }) {
  const [filter, setFilter] = useState("all");
  const [sel, setSel] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const [ar, setAr] = useState("");
  const [tr, setTr] = useState("");
  const [en, setEn] = useState("");
  const now = Date.now();
  const levels = ["all", ...Array.from({ length: MAX_LEVEL }, (_, k) => k + 1)];
  const shown = allItems.filter((it) => filter === "all" || it.level === filter);
  const selIds = Object.keys(sel).filter((k) => sel[k]);
  const learnedSet = (it) => !!state.progress[it.id];

  const badge = (it) => {
    const locked = it.level > level && !it.custom;
    const p = state.progress[it.id];
    if (locked) return { t: "🔒", c: T.textDim };
    if (!p) return { t: "new", c: T.pink };
    if (isLeech(p)) return { t: "⚠ " + stageMeta(p.stage).short, c: T.red };
    return { t: p.due === Infinity ? "burned" : stageMeta(p.stage).short, c: stageMeta(p.stage).color };
  };

  const startSelected = () => {
    const items = allItems.filter((it) => sel[it.id] && state.progress[it.id]);
    if (items.length) onStartPractice(items);
  };

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, marginBottom: 4 }}>
        {levels.map((l) => (
          <button key={l} className="tap" onClick={() => setFilter(l)} style={{ whiteSpace: "nowrap", border: `1px solid ${filter === l ? T.gold : T.line}`, background: filter === l ? `${T.gold}18` : "transparent", color: filter === l ? T.gold : T.textDim, borderRadius: 20, padding: "6px 13px", fontSize: 12.5, fontWeight: 600 }}>{l === "all" ? "All" : "Lv " + l}</button>
        ))}
      </div>

      {leeches > 0 && (
        <button className="tap" onClick={() => onStartPractice("leeches")} style={{ width: "100%", marginBottom: 10, padding: 11, borderRadius: 12, border: `1px solid ${T.red}`, background: `${T.red}0f`, color: T.red, fontSize: 13, fontWeight: 700 }}>
          🔁 Quiz my trouble words ({leeches})
        </button>
      )}

      <button className="tap" onClick={() => setShowAdd((s) => !s)} style={{ width: "100%", marginBottom: 12, padding: 11, borderRadius: 12, border: `1px dashed ${T.gold}`, background: `${T.gold}0d`, color: T.gold, fontSize: 13, fontWeight: 600 }}>{showAdd ? "Close" : "+ Add your own card"}</button>

      {showAdd && (
        <div className="fade" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
          {[["Arabic", ar, setAr, true, "اكتب هنا"], ["Transliteration", tr, setTr, false, "e.g. ezzaay"], ["English meaning", en, setEn, false, "e.g. How"]].map(([label, val, set, rtl, ph]) => (
            <div key={label} style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, color: T.textDim, marginBottom: 4 }}>{label}</div>
              <input value={val} onChange={(e) => set(e.target.value)} placeholder={ph} dir={rtl ? "rtl" : "ltr"} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${T.line}`, background: T.panelHi, color: T.text, fontSize: rtl ? 20 : 14, fontFamily: rtl ? arFont : "inherit", outline: "none" }} />
            </div>
          ))}
          <button className="tap" disabled={!ar.trim() || !en.trim()} onClick={() => { onAdd({ id: "u" + Date.now(), level, type: "word", ar: ar.trim(), tr: tr.trim() || "—", en: en.trim(), alts: [], custom: true }); setAr(""); setTr(""); setEn(""); setShowAdd(false); }} style={{ width: "100%", padding: 12, borderRadius: 11, border: "none", background: ar.trim() && en.trim() ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.line, color: ar.trim() && en.trim() ? "#fff" : T.textDim, fontWeight: 700, fontSize: 14 }}>Add to Level {level}</button>
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, margin: "2px 2px 8px" }}>
        Tap the circle on a learned word to pick it for a quiz.
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 8, paddingBottom: selIds.length ? 70 : 0 }}>
        {shown.map((it) => {
          const b = badge(it);
          const canSel = learnedSet(it);
          const picked = !!sel[it.id];
          return (
            <div key={it.id} style={{ background: picked ? `${T.gold}0d` : T.panel, border: `1px solid ${picked ? T.gold : T.line}`, borderRadius: 13, padding: "11px 13px", display: "flex", alignItems: "center", gap: 10 }}>
              <button className="tap" onClick={() => canSel && setSel((s) => ({ ...s, [it.id]: !s[it.id] }))} aria-label="select" style={{ width: 22, height: 22, borderRadius: 999, flexShrink: 0, cursor: canSel ? "pointer" : "default", border: `2px solid ${canSel ? (picked ? T.gold : T.line) : "transparent"}`, background: picked ? T.gold : "transparent", color: "#fff", fontSize: 12, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>{picked ? "✓" : ""}</button>
              <button className="tap" onClick={() => speak(it.ar)} aria-label="play" style={{ background: "transparent", border: "none", padding: 0, cursor: "pointer", minWidth: 74, display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ fontFamily: arFont, fontSize: 22, direction: "rtl", color: T.text }}>{it.ar}</span>
                <span style={{ fontSize: 10, color: T.goldSoft }}>🔊</span>
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, color: T.text }}>{it.en}</div>
                <div style={{ fontSize: 11.5, color: T.goldSoft, fontStyle: "italic" }}>{it.tr}</div>
              </div>
              <div style={{ fontSize: 10, color: b.c, border: `1px solid ${b.c}55`, borderRadius: 7, padding: "2px 7px", fontWeight: 700, whiteSpace: "nowrap" }}>{b.t}</div>
            </div>
          );
        })}
      </div>

      {selIds.length > 0 && (
        <div style={{ position: "fixed", left: 0, right: 0, bottom: 0, padding: "12px 18px calc(12px + env(safe-area-inset-bottom))", background: `linear-gradient(180deg, transparent, ${T.bg} 30%)` }}>
          <div style={{ maxWidth: 560, margin: "0 auto", display: "flex", gap: 8 }}>
            <button className="tap" onClick={() => setSel({})} style={{ padding: "13px 16px", borderRadius: 13, border: `1px solid ${T.line}`, background: T.panel, color: T.textDim, fontWeight: 600, fontSize: 13 }}>Clear</button>
            <button className="tap" onClick={startSelected} style={{ flex: 1, padding: "13px 16px", borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700, fontSize: 14 }}>Quiz selected ({selIds.length})</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ===================== APP ===================== */
function App() {
  const [state, setState] = useState(null);
  const [view, setView] = useState("home");
  const [practiceItems, setPracticeItems] = useState([]);

  const stateRef = useRef(state);
  useEffect(() => { stateRef.current = state; }, [state]);

  useEffect(() => {
    let mounted = true;
    (async () => {
      const loaded = await loadState();
      let s = loaded || DEFAULT_STATE;
      if (s.daily?.date !== todayStr()) s = { ...s, daily: { date: todayStr(), reviews: 0, lessons: 0 } };
      s = { ...DEFAULT_STATE, ...s, settings: { ...DEFAULT_STATE.settings, ...(s.settings || {}) } };
      if (mounted) setState(s);
    })();
    return () => { mounted = false; };
  }, []);

  useEffect(() => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    return () => { if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = null; };
  }, []);

  const persist = useCallback((next) => { setState(next); saveState(next); }, []);
  const allItems = useMemo(() => [...ITEMS, ...((state && state.custom) || [])], [state]);

  const derived = useMemo(() => {
    if (!state) return null;
    const now = Date.now();
    const lvl = state.currentLevel;
    const pool = allItems.filter((it) => (it.custom || it.level <= lvl) && !state.progress[it.id]);
    const due = allItems.filter((it) => { const p = state.progress[it.id]; return p && p.due !== Infinity && p.due <= now; });
    const leechList = allItems.filter((it) => isLeech(state.progress[it.id]));
    const levelItems = ITEMS.filter((it) => it.level === lvl);
    const guru = levelItems.filter((it) => (state.progress[it.id]?.stage || 0) >= 5).length;
    const levelPct = levelItems.length ? guru / levelItems.length : 0;
    const stageCounts = {};
    allItems.forEach((it) => { const p = state.progress[it.id]; if (!p) return; const g = stageMeta(p.stage).group; stageCounts[g] = (stageCounts[g] || 0) + 1; });
    return { pool, due, leechList, levelPct, stageCounts };
  }, [state, allItems]);

  const streak = useMemo(() => {
    if (!state) return 0;
    let n = 0, day = todayStr();
    if (!state.history[day]) day = shiftDay(day, -1);
    while (state.history[day] > 0) { n++; day = shiftDay(day, -1); }
    return n;
  }, [state]);

  const commitLearn = useCallback((id) => {
    setState((s) => {
      const day = todayStr();
      const daily = s.daily.date === day ? s.daily : { date: day, reviews: 0, lessons: 0 };
      const next = { ...s, progress: { ...s.progress, [id]: learnItem(Date.now()) }, daily: { ...daily, lessons: daily.lessons + 1 } };
      saveState(next);
      return next;
    });
  }, []);

  const grade = useCallback((id, correct, mode) => {
    const s = stateRef.current;
    const prog = s.progress[id];
    if (!prog) return null;
    const now = Date.now();
    let cur = s.currentLevel;
    let leveled = null;
    let np;
    if (mode === "practice") {
      np = { ...prog, correct: prog.correct + (correct ? 1 : 0), wrong: prog.wrong + (correct ? 0 : 1), recentWrong: correct ? 0 : (prog.recentWrong || 0) + 1, lastReviewed: now };
    } else {
      np = reviewSchedule(prog, correct, now);
      const progress0 = { ...s.progress, [id]: np };
      const levelItems = ITEMS.filter((it) => it.level === cur);
      const guru = levelItems.filter((it) => (progress0[it.id]?.stage || 0) >= 5).length;
      if (levelItems.length && guru / levelItems.length >= 0.9 && cur < MAX_LEVEL) { cur += 1; leveled = cur; }
    }
    const day = todayStr();
    const daily = s.daily.date === day ? s.daily : { date: day, reviews: 0, lessons: 0 };
    const next = {
      ...s,
      currentLevel: cur,
      progress: { ...s.progress, [id]: np },
      daily: { ...daily, reviews: daily.reviews + (mode === "practice" ? 0 : 1) },
      history: { ...s.history, [day]: (s.history[day] || 0) + 1 },
    };
    persist(next);
    return leveled;
  }, [persist]);

  const startPractice = useCallback((itemsOrLeech) => {
    const items = itemsOrLeech === "leeches" ? (derived ? derived.leechList : []) : itemsOrLeech;
    if (items && items.length) { setPracticeItems(items); setView("practice"); }
  }, [derived]);

  if (!state || !derived)
    return <div style={{ minHeight: "100vh", background: T.bg, color: T.textDim, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: uiFont }}>Loading…</div>;

  const tabs = [
    ["home", "Home"],
    ["lessons", "Lessons", derived.pool.length],
    ["reviews", "Reviews", derived.due.length],
    ["script", "Script"],
    ["items", "Items"],
  ];

  return (
    <div style={{ minHeight: "100vh", background: `radial-gradient(1100px 560px at 50% -10%, ${T.bg2}, ${T.bg})`, color: T.text, fontFamily: uiFont, paddingBottom: 40 }}>
      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeUp { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }
        @keyframes pop { from { opacity:0; transform: scale(.97);} to {opacity:1; transform:none;} }
        @keyframes pulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; } 50% { transform: translate(-50%,-50%) scale(1.55); opacity:.45; } }
        .tap { transition: transform .12s ease, background .15s ease, border-color .15s ease; cursor: pointer; }
        .tap:active { transform: scale(.97); }
        .fade { animation: fadeUp .35s ease both; }
        .pop { animation: pop .25s ease both; }
        input, button, select { font-family: inherit; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: ${T.line}; border-radius: 8px; }
      `}</style>

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "22px 18px 10px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 38, height: 38, borderRadius: 11, background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: arFont, fontSize: 22, color: "#fff", fontWeight: 700, boxShadow: "0 4px 14px rgba(128,29,92,.22)" }}>ع</div>
          <div>
            <div style={{ fontFamily: displayFont, fontSize: 19 }}>Masri <span style={{ color: T.goldSoft }}>SRS</span></div>
            <div style={{ fontSize: 11.5, color: T.textDim, marginTop: -1 }}>Egyptian Arabic · level {state.currentLevel}</div>
          </div>
          <div style={{ marginLeft: "auto", textAlign: "right" }}>
            <div style={{ fontSize: 11, color: T.textDim }}>streak</div>
            <div style={{ fontSize: 16, color: T.gold, fontWeight: 700 }}>{streak}🔥</div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 5, marginTop: 16, background: T.panel, padding: 5, borderRadius: 13, border: `1px solid ${T.line}` }}>
          {tabs.map(([k, label, n]) => (
            <button key={k} className="tap" onClick={() => setView(k)} style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 2px", fontSize: 12, fontWeight: 600, position: "relative", color: view === k ? "#fff" : T.textDim, background: view === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent" }}>
              {label}
              {n > 0 && view !== k && (<span style={{ marginLeft: 4, fontSize: 10, background: T.terra, color: "#fff", borderRadius: 8, padding: "1px 5px" }}>{n}</span>)}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "8px 18px" }}>
        {view === "home" && (
          <HomeView
            state={state}
            level={state.currentLevel}
            levelPct={derived.levelPct}
            lessons={derived.pool.length}
            reviews={derived.due.length}
            leeches={derived.leechList.length}
            stageCounts={derived.stageCounts}
            streak={streak}
            onGo={setView}
            onTrouble={() => startPractice("leeches")}
            onSetting={(patch) => persist({ ...state, settings: { ...state.settings, ...patch } })}
            onReset={() => { persist({ ...DEFAULT_STATE, custom: state.custom, settings: state.settings, daily: { date: todayStr(), reviews: 0, lessons: 0 } }); setView("home"); }}
          />
        )}
        {view === "lessons" && (
          <LearnSession pool={derived.pool} batch={state.settings.lessonBatch} onLearn={commitLearn} onGrade={grade} onExit={() => setView("home")} />
        )}
        {view === "reviews" && <TypedQuiz items={derived.due} mode="srs" onGrade={grade} onExit={() => setView("home")} title="Reviews" />}
        {view === "practice" && <TypedQuiz items={practiceItems} mode="practice" onGrade={grade} onExit={() => setView("items")} title="Practice" />}
        {view === "script" && <ScriptView scriptState={state.script} setScript={(next) => persist({ ...state, script: next })} />}
        {view === "items" && (
          <ItemsView allItems={allItems} state={state} level={state.currentLevel} leeches={derived.leechList.length} onAdd={(c) => persist({ ...state, custom: [...state.custom, c] })} onStartPractice={startPractice} />
        )}
      </div>
    </div>
  );
}

/* ===================== SCRIPT TRAIN (learn + quiz the alphabet) ===================== */
function makeLetterQ(answer) {
  const pool = shuffle(ALPHABET.filter((x) => x[2] !== answer[2])).slice(0, 3);
  return { answer, options: shuffle([answer, ...pool]) };
}

function ScriptTrain({ scriptState, setScript }) {
  const ss = scriptState || { progress: {}, best: 0, batch: 5 };
  const prog = ss.progress || {};
  const batch = ss.batch || 5;

  const [mode, setMode] = useState("menu"); // menu | teach | quiz
  const [teachQueue, setTeachQueue] = useState([]);
  const [tIdx, setTIdx] = useState(0);
  const [quizSet, setQuizSet] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [q, setQ] = useState(null);
  const [picked, setPicked] = useState(null);
  const [sess, setSess] = useState({ right: 0, total: 0, streak: 0, best: ss.best || 0 });
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);

  const learned = ALPHABET.filter((a) => prog[a[0]] && prog[a[0]].learned);
  const unlearned = ALPHABET.filter((a) => !(prog[a[0]] && prog[a[0]].learned));
  const trouble = ALPHABET.filter((a) => (prog[a[0]]?.recentWrong || 0) >= 2);
  const mastered = ALPHABET.filter((a) => { const p = prog[a[0]]; return p && p.correct >= 4 && (p.recentWrong || 0) === 0; });

  const saveLetter = (key, correct, newStreak) => {
    const p = prog[key] || { learned: true, correct: 0, wrong: 0, recentWrong: 0 };
    const np = {
      learned: true,
      correct: p.correct + (correct ? 1 : 0),
      wrong: p.wrong + (correct ? 0 : 1),
      recentWrong: correct ? 0 : (p.recentWrong || 0) + 1,
    };
    setScript({ ...ss, progress: { ...prog, [key]: np }, best: Math.max(ss.best || 0, newStreak || 0) });
  };
  const markLearned = (key) => {
    if (prog[key] && prog[key].learned) return;
    const p = prog[key] || { correct: 0, wrong: 0, recentWrong: 0 };
    setScript({ ...ss, progress: { ...prog, [key]: { ...p, learned: true } } });
  };
  const setBatch = (n) => setScript({ ...ss, batch: n });

  /* ---- start flows ---- */
  const startLearn = () => {
    const next = unlearned.slice(0, batch);
    if (!next.length) return;
    setTeachQueue(next);
    setTIdx(0);
    setMode("teach");
  };
  const startQuiz = (list) => {
    if (!list.length) return;
    const set = shuffle(list).slice(0, 12);
    setQuizSet(set);
    setQIdx(0);
    setPicked(null);
    setQ(makeLetterQ(set[0]));
    setSess({ right: 0, total: 0, streak: 0, best: ss.best || 0 });
    setMode("quiz");
  };

  /* ---- quiz answer ---- */
  const choose = (opt) => {
    if (picked) return;
    const ans = q.answer;
    const correct = opt[2] === ans[2];
    speak(ans[0]);
    setPicked(opt);
    const newStreak = correct ? sess.streak + 1 : 0;
    setSess((s) => ({ right: s.right + (correct ? 1 : 0), total: s.total + 1, streak: newStreak, best: Math.max(s.best, newStreak) }));
    saveLetter(ans[0], correct, newStreak);
    timer.current = setTimeout(() => {
      const n = qIdx + 1;
      if (n >= quizSet.length) {
        setMode("done");
      } else {
        setQIdx(n);
        setPicked(null);
        setQ(makeLetterQ(quizSet[n]));
      }
    }, 950);
  };

  /* ===================== MENU ===================== */
  if (mode === "menu") {
    return (
      <div className="fade" style={{ paddingTop: 4 }}>
        <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 20, padding: "18px 18px 16px", marginBottom: 14, boxShadow: "0 12px 30px rgba(128,29,92,.08)" }}>
          <div style={{ fontFamily: displayFont, fontSize: 21, color: T.gold }}>Master the alphabet</div>
          <div style={{ fontSize: 12.5, color: T.textDim, marginTop: 3, lineHeight: 1.5 }}>
            Learn {batch} letters, then quiz them — same idea as the word lessons. Lock in the script and reading the words gets much easier.
          </div>
          <div style={{ margin: "14px 0 6px" }}>
            <Bar pct={learned.length / ALPHABET.length} />
          </div>
          <div style={{ fontSize: 12, color: T.textDim }}>{learned.length} / {ALPHABET.length} letters learned · {mastered.length} mastered</div>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat label="Best streak" value={`${ss.best || 0}🔥`} color={T.terra} />
          <Stat label="Learned" value={learned.length} color={T.gold} />
          <Stat label="Trouble" value={trouble.length} color={trouble.length ? T.red : T.textDim} />
        </div>

        <button className="tap" onClick={startLearn} disabled={!unlearned.length} style={{ width: "100%", padding: 15, borderRadius: 14, border: "none", marginBottom: 10, background: unlearned.length ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel, color: unlearned.length ? "#fff" : T.textDim, fontSize: 15, fontWeight: 700, boxShadow: unlearned.length ? "0 8px 20px rgba(128,29,92,.18)" : "none", border: unlearned.length ? "none" : `1px solid ${T.line}` }}>
          {unlearned.length ? `Learn next ${Math.min(batch, unlearned.length)} letters →` : "All 28 letters learned 🎉"}
        </button>

        <button className="tap" onClick={() => startQuiz(learned)} disabled={!learned.length} style={{ width: "100%", padding: 13, borderRadius: 13, marginBottom: 10, border: `1px solid ${learned.length ? T.gold : T.line}`, background: learned.length ? `${T.gold}10` : T.panel, color: learned.length ? T.gold : T.textDim, fontSize: 14, fontWeight: 700 }}>
          ✨ Quiz learned letters
        </button>

        <button className="tap" onClick={() => startQuiz(trouble)} disabled={!trouble.length} style={{ width: "100%", padding: 13, borderRadius: 13, border: `1px solid ${trouble.length ? T.red : T.line}`, background: trouble.length ? `${T.red}0f` : T.panel, color: trouble.length ? T.red : T.textDim, fontSize: 14, fontWeight: 700 }}>
          🔁 Drill trouble letters {trouble.length ? `(${trouble.length})` : ""}
        </button>

        <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: 16, marginTop: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14 }}>Letters per quiz</span>
            <div style={{ display: "flex", gap: 8 }}>
              {[3, 5, 7, 10].map((n) => (
                <button key={n} className="tap" onClick={() => setBatch(n)} style={{ border: `1px solid ${batch === n ? T.gold : T.line}`, background: batch === n ? `${T.gold}18` : "transparent", color: batch === n ? T.gold : T.textDim, borderRadius: 9, padding: "6px 11px", fontSize: 13, fontWeight: 600 }}>{n}</button>
              ))}
            </div>
          </div>
        </div>

        {trouble.length > 0 && (
          <div style={{ marginTop: 14, display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center" }}>
            {trouble.map((a) => (
              <span key={a[0]} style={{ fontFamily: arFont, fontSize: 26, color: T.red, border: `1px solid ${T.red}44`, borderRadius: 9, padding: "2px 10px", direction: "rtl" }}>{a[0]}</span>
            ))}
          </div>
        )}
      </div>
    );
  }

  /* ===================== TEACH ===================== */
  if (mode === "teach") {
    const a = teachQueue[tIdx];
    const f = letterForms(a[0]);
    const sk = STROKES[a[0]];
    return (
      <div className="fade">
        <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
          <div style={{ height: "100%", width: `${(tIdx / teachQueue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})` }} />
        </div>
        <div className="pop" key={a[0]} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "26px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)" }}>
          <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>New letter</div>
          <div style={{ fontFamily: arFont, fontSize: 88, color: T.text, direction: "rtl", lineHeight: 1.1, margin: "6px 0 4px" }}>{a[0]}</div>
          <div style={{ fontSize: 17, color: T.text }}>{a[1]} <span style={{ color: T.goldSoft, fontStyle: "italic" }}>· {a[2]}</span></div>
          <div style={{ fontSize: 13, color: T.textDim, marginTop: 4, lineHeight: 1.5 }}>{a[3]}</div>
          {sk && <div style={{ fontSize: 12.5, color: T.gold, marginTop: 6, lineHeight: 1.5 }}>✍️ {sk[1]}</div>}
          <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
            {[["iso", f.iso], ["init", f.ini], ["med", f.med], ["fin", f.fin]].map(([k, glyph]) => (
              <div key={k} style={{ flex: 1, textAlign: "center", background: T.panel, border: `1px solid ${T.line}`, borderRadius: 9, padding: "8px 2px" }}>
                <div style={{ fontFamily: arFont, fontSize: 26, color: T.text, direction: "rtl", minHeight: 32 }}>{glyph}</div>
                <div style={{ fontSize: 9, color: T.textDim, marginTop: 3, textTransform: "uppercase", letterSpacing: 0.5 }}>{k}</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 14 }}><Speaker text={a[0]} size={20} color={T.gold} /></div>
        </div>
        <button
          className="tap"
          onClick={() => {
            markLearned(a[0]);
            if (tIdx + 1 >= teachQueue.length) startQuiz(teachQueue);
            else setTIdx(tIdx + 1);
          }}
          style={{ width: "100%", marginTop: 14, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}
        >
          {tIdx + 1 >= teachQueue.length ? "Got them — quiz me →" : "Learn it ✓"}
        </button>
        <div style={{ textAlign: "center", fontSize: 12, color: T.textDim, marginTop: 10 }}>Learning {tIdx + 1} of {teachQueue.length}</div>
      </div>
    );
  }

  /* ===================== DONE ===================== */
  if (mode === "done") {
    const acc = sess.total ? Math.round((sess.right / sess.total) * 100) : 0;
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>🎉</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>Nice work!</div>
        <div style={{ color: T.textDim, fontSize: 14, marginTop: 8 }}>{sess.right}/{sess.total} correct · {acc}% · best streak {sess.best}🔥</div>
        <button className="tap" onClick={() => setMode("menu")} style={{ width: "100%", marginTop: 18, padding: 14, borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Back</button>
      </div>
    );
  }

  /* ===================== QUIZ ===================== */
  const ans = q.answer;
  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <Stat label="Score" value={`${sess.right}/${sess.total}`} color={T.gold} />
        <Stat label="Streak" value={`${sess.streak}🔥`} color={T.terra} />
        <Stat label="Best" value={sess.best} color={T.green} />
      </div>

      <div className="pop" key={ans[0] + qIdx} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "26px 20px", textAlign: "center", boxShadow: "0 12px 30px rgba(128,29,92,.10)", marginBottom: 16 }}>
        <div style={{ fontSize: 12, color: T.textDim, marginBottom: 10 }}>Which sound is this?</div>
        <div style={{ fontFamily: arFont, fontSize: 84, color: T.text, direction: "rtl", lineHeight: 1 }}>{ans[0]}</div>
        <div style={{ marginTop: 12 }}><Speaker text={ans[0]} size={18} color={T.terra} /></div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {q.options.map((opt, i) => {
          let bg = T.panel, border = T.line, col = T.text;
          if (picked) {
            const isCorrect = opt[2] === ans[2];
            const isPicked = opt[2] === picked[2];
            if (isCorrect) { bg = `${T.green}1a`; border = T.green; col = T.gold; }
            else if (isPicked) { bg = `${T.red}1a`; border = T.red; col = T.red; }
          }
          return (
            <button key={i} className="tap" onClick={() => choose(opt)} style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 14, padding: "14px 8px", cursor: "pointer", minHeight: 58, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontFamily: displayFont, fontSize: 22, color: col, fontWeight: 600 }}>{opt[2]}</span>
            </button>
          );
        })}
      </div>

      {picked && (
        <div className="fade" style={{ textAlign: "center", marginTop: 14, fontSize: 14 }}>
          <span style={{ fontFamily: arFont, fontSize: 24, color: T.text }}>{ans[0]}</span>
          <span style={{ color: T.textDim }}> = </span>
          <span style={{ color: T.gold, fontWeight: 700 }}>{ans[1]}</span>
          <span style={{ color: T.goldSoft, fontStyle: "italic" }}> · {ans[2]}</span>
        </div>
      )}

      <button className="tap" onClick={() => { clearTimeout(timer.current); setMode("menu"); }} style={{ width: "100%", marginTop: 16, padding: 10, borderRadius: 12, border: "none", background: "transparent", color: T.textDim, fontSize: 12 }}>
        End session
      </button>
      <div style={{ fontSize: 11, color: T.textDim, textAlign: "center", marginTop: 6, lineHeight: 1.6 }}>
        {qIdx + 1} of {quizSet.length} · you'll hear each letter as you answer.
      </div>
    </div>
  );
}

/* ---- shuffle helper ---- */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeQuestion(qmode) {
  const answer = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
  const pool = shuffle(ALPHABET.filter((x) => x[2] !== answer[2])).slice(0, 3);
  const options = shuffle([answer, ...pool]);
  return { answer, options, qmode };
}

function ScriptQuiz() {
  // qmode: "l2s" show letter, pick sound | "s2l" show sound, pick letter
  const [dirMode, setDirMode] = useState("l2s");
  const [q, setQ] = useState(() => makeQuestion("l2s"));
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState({ right: 0, total: 0, streak: 0, best: 0 });

  const next = useCallback(
    (dm) => {
      setPicked(null);
      setQ(makeQuestion(dm || dirMode));
    },
    [dirMode]
  );

  const choose = (opt) => {
    if (picked) return;
    const correct = opt[2] === q.answer[2];
    speak(q.answer[0]);
    setPicked(opt);
    setScore((s) => {
      const streak = correct ? s.streak + 1 : 0;
      return {
        right: s.right + (correct ? 1 : 0),
        total: s.total + 1,
        streak,
        best: Math.max(s.best, streak),
      };
    });
    setTimeout(() => next(), 1100);
  };

  const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;
  const showLetter = q.qmode === "l2s";

  return (
    <div className="fade">
      {/* scoreboard */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <Stat label="Score" value={`${score.right}/${score.total}`} color={T.gold} />
        <Stat label="Accuracy" value={`${acc}%`} color={T.terra} />
        <Stat label="Streak" value={`${score.streak}🔥`} color={T.amber} />
        <Stat label="Best" value={score.best} color={T.green} />
      </div>

      {/* direction toggle */}
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
        <button
          className="tap"
          onClick={() => {
            const dm = dirMode === "l2s" ? "s2l" : "l2s";
            setDirMode(dm);
            next(dm);
          }}
          style={{
            border: `1px solid ${T.line}`,
            background: T.panelHi,
            color: T.gold,
            borderRadius: 20,
            padding: "7px 14px",
            fontSize: 12.5,
            fontWeight: 600,
          }}
        >
          {dirMode === "l2s" ? "See letter → pick sound" : "See sound → pick letter"} ⇄
        </button>
      </div>

      {/* prompt */}
      <div
        className="pop"
        key={q.answer[1] + q.qmode}
        style={{
          background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`,
          border: `1px solid ${T.line}`,
          borderRadius: 22,
          padding: "30px 20px",
          textAlign: "center",
          boxShadow: "0 14px 36px rgba(128,29,92,.10)",
          marginBottom: 16,
        }}
      >
        <div style={{ fontSize: 12, color: T.textDim, marginBottom: 10 }}>
          {showLetter ? "Which sound is this?" : "Which letter makes this sound?"}
        </div>
        {showLetter ? (
          <div style={{ fontFamily: arFont, fontSize: 84, color: T.text, direction: "rtl", lineHeight: 1 }}>
            {q.answer[0]}
          </div>
        ) : (
          <div style={{ fontFamily: displayFont, fontSize: 40, color: T.gold }}>
            {q.answer[2]}
          </div>
        )}
        <div style={{ marginTop: 14 }}>
          <Speaker text={q.answer[0]} size={18} color={T.terra} />
        </div>
      </div>

      {/* options */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {q.options.map((opt, i) => {
          let bg = T.panel,
            border = T.line,
            col = T.text;
          if (picked) {
            const isCorrect = opt[2] === q.answer[2];
            const isPicked = opt[2] === picked[2];
            if (isCorrect) {
              bg = `${T.green}1a`;
              border = T.green;
              col = T.gold;
            } else if (isPicked) {
              bg = `${T.red}1a`;
              border = T.red;
              col = T.red;
            }
          }
          return (
            <button
              key={i}
              className="tap"
              onClick={() => choose(opt)}
              style={{
                background: bg,
                border: `1.5px solid ${border}`,
                borderRadius: 14,
                padding: showLetter ? "16px 8px" : "12px 8px",
                cursor: "pointer",
                minHeight: 64,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
              }}
            >
              {showLetter ? (
                <span style={{ fontFamily: displayFont, fontSize: 22, color: col, fontWeight: 600 }}>
                  {opt[2]}
                </span>
              ) : (
                <span style={{ fontFamily: arFont, fontSize: 40, color: col, direction: "rtl" }}>
                  {opt[0]}
                </span>
              )}
            </button>
          );
        })}
      </div>

      {picked && (
        <div className="fade" style={{ textAlign: "center", marginTop: 16, fontSize: 14 }}>
          <span style={{ fontFamily: arFont, fontSize: 26, color: T.text }}>{q.answer[0]}</span>
          <span style={{ color: T.textDim }}> = </span>
          <span style={{ color: T.gold, fontWeight: 700 }}>{q.answer[1]}</span>
          <span style={{ color: T.goldSoft, fontStyle: "italic" }}> · {q.answer[2]}</span>
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, textAlign: "center", marginTop: 18, lineHeight: 1.6 }}>
        Tap an answer — you'll hear the letter and the next question loads automatically.
      </div>
    </div>
  );
}

function ScriptTrace() {
  const [tmode, setTmode] = useState("practice"); // practice | quiz
  const [idx, setIdx] = useState(0);
  const [showGuide, setShowGuide] = useState(true);
  const [qIdx, setQIdx] = useState(() => Math.floor(Math.random() * ALPHABET.length));
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ right: 0, total: 0, streak: 0, best: 0 });
  const canvasRef = React.useRef(null);
  const drawing = React.useRef(false);
  const last = React.useRef(null);
  const [, setStrokes] = useState(0);

  const isQuiz = tmode === "quiz";
  const activeIdx = isQuiz ? qIdx : idx;
  const letter = ALPHABET[activeIdx];
  const sk = STROKES[letter[0]];
  const sxy = sk ? START_XY[sk[0]] : null;
  const guideOn = isQuiz ? revealed : showGuide;
  const showDetails = !isQuiz || revealed; // when to reveal name-shape details

  const setup = useCallback(() => {
    const c = canvasRef.current;
    if (!c) return;
    const rect = c.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = rect.width * dpr;
    c.height = rect.height * dpr;
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = 11;
    ctx.strokeStyle = "#801d5c";
  }, []);

  useEffect(() => {
    setup();
    const onResize = () => setup();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [setup]);

  const clear = useCallback(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    setStrokes(0);
  }, []);

  // clear whenever the active letter or mode changes
  useEffect(() => {
    clear();
  }, [activeIdx, tmode, clear]);

  const pos = (e) => {
    const c = canvasRef.current;
    const rect = c.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  };
  const start = (e) => {
    e.preventDefault();
    drawing.current = true;
    last.current = pos(e);
    setStrokes((s) => s + 1);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const c = canvasRef.current;
    const ctx = c.getContext("2d");
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last.current = p;
  };
  const end = () => {
    drawing.current = false;
  };

  const nextQuiz = () => {
    setRevealed(false);
    clear();
    setQIdx((prev) => {
      let n;
      do {
        n = Math.floor(Math.random() * ALPHABET.length);
      } while (n === prev && ALPHABET.length > 1);
      return n;
    });
  };
  const grade = (ok) => {
    setScore((s) => {
      const streak = ok ? s.streak + 1 : 0;
      return {
        right: s.right + (ok ? 1 : 0),
        total: s.total + 1,
        streak,
        best: Math.max(s.best, streak),
      };
    });
    nextQuiz();
  };
  const switchMode = (m) => {
    if (m === tmode) return;
    setTmode(m);
    setRevealed(false);
    clear();
    if (m === "quiz") setQIdx(Math.floor(Math.random() * ALPHABET.length));
  };

  const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;

  return (
    <div className="fade">
      {/* practice / quiz toggle */}
      <div
        style={{
          display: "flex",
          gap: 6,
          background: T.panelHi,
          border: `1px solid ${T.line}`,
          padding: 5,
          borderRadius: 12,
          marginBottom: 14,
        }}
      >
        {[
          ["practice", "Practice"],
          ["quiz", "Quiz"],
        ].map(([k, label]) => (
          <button
            key={k}
            className="tap"
            onClick={() => switchMode(k)}
            style={{
              flex: 1,
              border: "none",
              borderRadius: 8,
              padding: "8px 4px",
              fontSize: 12.5,
              fontWeight: 600,
              color: tmode === k ? "#ffffff" : T.textDim,
              background: tmode === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent",
            }}
          >
            {label}
          </button>
        ))}
      </div>

      {/* golden rules primer */}
      <div
        style={{
          background: T.panelHi,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: "12px 14px",
          marginBottom: 14,
          fontSize: 12.5,
          lineHeight: 1.7,
        }}
      >
        <b style={{ color: T.gold }}>Golden rules of Arabic handwriting</b>
        <div style={{ color: T.textDim, marginTop: 5 }}>
          1. Always write right → left.
          <br />
          2. Tall vertical strokes go top → bottom.
          <br />
          3. Bowl &amp; toothed letters start from the right and sweep left.
          <br />
          4. Add all dots and hamzas <b style={{ color: T.text }}>last</b>, once the body is done.
        </div>
      </div>

      {/* quiz scoreboard */}
      {isQuiz && (
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat label="Score" value={`${score.right}/${score.total}`} color={T.gold} />
          <Stat label="Accuracy" value={`${acc}%`} color={T.terra} />
          <Stat label="Streak" value={`${score.streak}🔥`} color={T.amber} />
          <Stat label="Best" value={score.best} color={T.green} />
        </div>
      )}

      {/* info / prompt card */}
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 12,
          background: T.panel,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: "12px 14px",
          marginBottom: 14,
        }}
      >
        <div style={{ flex: 1 }}>
          {isQuiz && !revealed && (
            <div style={{ fontSize: 11, color: T.terra, fontWeight: 700, letterSpacing: 0.4, marginBottom: 3 }}>
              WRITE THIS LETTER FROM MEMORY
            </div>
          )}
          <div style={{ fontSize: 16, color: T.text, fontWeight: 600 }}>
            {letter[1]}{" "}
            <span style={{ color: T.goldSoft, fontStyle: "italic", fontWeight: 400 }}>
              · {letter[2]}
            </span>
          </div>
          {showDetails && (
            <>
              <div style={{ fontSize: 12, color: T.textDim, marginTop: 2 }}>{letter[3]}</div>
              {sk && (
                <div style={{ fontSize: 12.5, color: T.gold, marginTop: 5, lineHeight: 1.5 }}>
                  ✍️ {sk[1]}
                </div>
              )}
            </>
          )}
        </div>
        <Speaker text={letter[0]} color={T.terra} />
        {!isQuiz && (
          <div style={{ fontSize: 12, color: T.textDim }}>
            {idx + 1}/{ALPHABET.length}
          </div>
        )}
      </div>

      {/* canvas + guide */}
      <div
        style={{
          position: "relative",
          width: "100%",
          aspectRatio: "1 / 1",
          background: T.panel,
          border: `1px solid ${T.line}`,
          borderRadius: 20,
          overflow: "hidden",
          boxShadow: "0 14px 36px rgba(128,29,92,.10)",
        }}
      >
        {/* guide glyph */}
        {guideOn && (
          <div
            style={{
              position: "absolute",
              inset: 0,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              fontFamily: arFont,
              fontSize: "min(58vw, 320px)",
              color: T.pink || "#cd81a9",
              opacity: 0.28,
              direction: "rtl",
              pointerEvents: "none",
              userSelect: "none",
              lineHeight: 1,
            }}
          >
            {letter[0]}
          </div>
        )}
        {/* dotted guideline */}
        <div
          style={{
            position: "absolute",
            top: "50%",
            left: 0,
            right: 0,
            borderTop: `2px dashed ${T.line}`,
            pointerEvents: "none",
          }}
        />
        {/* start marker */}
        {guideOn && sxy && (
          <div
            style={{
              position: "absolute",
              left: sxy[0],
              top: sxy[1],
              transform: "translate(-50%,-50%)",
              pointerEvents: "none",
              textAlign: "center",
            }}
          >
            <div
              style={{
                width: 16,
                height: 16,
                borderRadius: 999,
                background: T.terra,
                border: "2px solid #fff",
                boxShadow: "0 1px 5px rgba(0,0,0,.25)",
                animation: "pulse 1.5s ease-in-out infinite",
                margin: "0 auto",
              }}
            />
            <div style={{ fontSize: 9, fontWeight: 800, color: T.terra, marginTop: 3, letterSpacing: 0.5 }}>
              START
            </div>
          </div>
        )}
        <canvas
          ref={canvasRef}
          onMouseDown={start}
          onMouseMove={move}
          onMouseUp={end}
          onMouseLeave={end}
          onTouchStart={start}
          onTouchMove={move}
          onTouchEnd={end}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", touchAction: "none", cursor: "crosshair" }}
        />
      </div>

      {/* controls */}
      {!isQuiz ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button
            className="tap"
            onClick={() => setIdx((i) => (i - 1 + ALPHABET.length) % ALPHABET.length)}
            style={ctrlBtn(false)}
          >
            ‹ Prev
          </button>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>
            Clear
          </button>
          <button className="tap" onClick={() => setShowGuide((g) => !g)} style={ctrlBtn(showGuide)}>
            {showGuide ? "Hide guide" : "Show guide"}
          </button>
          <button
            className="tap"
            onClick={() => setIdx((i) => (i + 1) % ALPHABET.length)}
            style={ctrlBtn(true)}
          >
            Next ›
          </button>
        </div>
      ) : !revealed ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>
            Clear
          </button>
          <button className="tap" onClick={nextQuiz} style={ctrlBtn(false)}>
            Skip
          </button>
          <button className="tap" onClick={() => setRevealed(true)} style={{ ...ctrlBtn(true), flex: 2 }}>
            Reveal answer
          </button>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button
            className="tap"
            onClick={() => grade(false)}
            style={{
              flex: 1,
              padding: "12px 4px",
              borderRadius: 12,
              fontSize: 13,
              fontWeight: 700,
              cursor: "pointer",
              border: `1.5px solid ${T.red}`,
              background: `${T.red}14`,
              color: T.text,
            }}
          >
            Practice again
          </button>
          <button
            className="tap"
            onClick={() => grade(true)}
            style={{
              flex: 1,
              padding: "12px 4px",
              borderRadius: 12,
              fontSize: 13,
              fontWeight: 700,
              cursor: "pointer",
              border: "none",
              background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`,
              color: "#ffffff",
            }}
          >
            Got it ✓
          </button>
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, textAlign: "center", marginTop: 16, lineHeight: 1.6 }}>
        {!isQuiz ? (
          <>
            Begin at the pulsing <b style={{ color: T.terra }}>START</b> dot and follow the ✍️ steps above.
            Arabic flows <b style={{ color: T.text }}>right → left</b>. Tap “Hide guide” to test yourself from memory.
          </>
        ) : !revealed ? (
          <>
            Picture the letter, write it from memory, then tap <b style={{ color: T.text }}>Reveal answer</b> to check
            the shape and dots. Tap 🔊 to hear it.
          </>
        ) : (
          <>
            Compare your writing to the guide. Be honest — did you get the <b style={{ color: T.text }}>shape and dots</b>{" "}
            right?
          </>
        )}
      </div>
    </div>
  );
}

function ctrlBtn(active) {
  return {
    flex: 1,
    padding: "11px 4px",
    borderRadius: 12,
    fontSize: 12.5,
    fontWeight: 600,
    cursor: "pointer",
    border: active ? "none" : `1px solid ${T.line}`,
    background: active ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel,
    color: active ? "#ffffff" : T.text,
  };
}

function ScriptLearn() {
  return (
    <div className="fade" style={{ paddingTop: 6 }}>
      <div style={{ fontFamily: displayFont, fontSize: 20, marginBottom: 6 }}>
        Read &amp; write the script
      </div>
      <p style={{ fontSize: 13.5, color: T.textDim, lineHeight: 1.7, marginTop: 0 }}>
        Arabic is written right-to-left. There are 28 letters, and most change
        shape depending on where they sit in a word. Short vowels usually aren't
        written — you learn them from the word itself.
      </p>

      <div style={{ fontFamily: displayFont, fontSize: 16, margin: "18px 0 10px", color: T.gold }}>
        Pronunciation key
      </div>
      <p style={{ fontSize: 12.5, color: T.textDim, lineHeight: 1.6, marginTop: -4 }}>
        The italic spelling under each card (e.g. <i>ezzaay</i>) uses these symbols:
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
        {LEGEND.map(([sym, desc]) => (
          <div
            key={sym}
            style={{
              display: "flex",
              gap: 12,
              alignItems: "center",
              background: T.panel,
              border: `1px solid ${T.line}`,
              borderRadius: 11,
              padding: "9px 13px",
            }}
          >
            <span style={{ color: T.gold, fontWeight: 700, fontSize: 15, minWidth: 64 }}>
              {sym}
            </span>
            <span style={{ fontSize: 12.5, color: T.text, lineHeight: 1.5 }}>{desc}</span>
          </div>
        ))}
      </div>

      <div style={{ fontFamily: displayFont, fontSize: 16, margin: "24px 0 4px", color: T.gold }}>
        The alphabet
      </div>
      <div style={{ fontSize: 12, color: T.textDim, marginBottom: 12, lineHeight: 1.6 }}>
        Each row shows the four shapes a letter takes:{" "}
        <b style={{ color: T.text }}>isolated · initial · medial · final</b>. Tap 🔊 to
        hear it.
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
        {ALPHABET.map(([l, name, tr, note]) => {
          const f = letterForms(l);
          return (
            <div
              key={name}
              style={{
                background: T.panel,
                border: `1px solid ${T.line}`,
                borderRadius: 14,
                padding: "12px 14px",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div
                  style={{
                    fontFamily: arFont,
                    fontSize: 40,
                    color: T.text,
                    minWidth: 46,
                    textAlign: "center",
                    direction: "rtl",
                  }}
                >
                  {l}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14.5, color: T.text }}>
                    {name}{" "}
                    <span style={{ color: T.goldSoft, fontStyle: "italic" }}>· {tr}</span>
                  </div>
                  <div style={{ fontSize: 12, color: T.textDim, lineHeight: 1.5 }}>{note}</div>
                  {STROKES[l] && (
                    <div style={{ fontSize: 12, color: T.gold, lineHeight: 1.5, marginTop: 3 }}>
                      ✍️ {STROKES[l][1]}
                    </div>
                  )}
                </div>
                <Speaker text={l} />
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                {[
                  ["iso", f.iso],
                  ["init", f.ini],
                  ["med", f.med],
                  ["fin", f.fin],
                ].map(([k, glyph]) => (
                  <div
                    key={k}
                    style={{
                      flex: 1,
                      textAlign: "center",
                      background: T.panelHi,
                      border: `1px solid ${T.line}`,
                      borderRadius: 9,
                      padding: "8px 2px",
                    }}
                  >
                    <div
                      style={{
                        fontFamily: arFont,
                        fontSize: 26,
                        color: T.text,
                        direction: "rtl",
                        minHeight: 32,
                      }}
                    >
                      {glyph}
                    </div>
                    <div
                      style={{
                        fontSize: 9,
                        color: T.textDim,
                        marginTop: 3,
                        textTransform: "uppercase",
                        letterSpacing: 0.5,
                      }}
                    >
                      {k}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ fontFamily: displayFont, fontSize: 16, margin: "24px 0 10px", color: T.gold }}>
        Writing tips
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 9, fontSize: 13, lineHeight: 1.65 }}>
        <Note title="Letters join up">
          Most letters connect to the ones before and after, changing shape to fit. Write
          the skeleton of a word in one flowing stroke, then go back and add the dots.
        </Note>
        <Note title="Six one-way letters">
          <span style={{ fontFamily: arFont, fontSize: 20 }}>ا د ذ ر ز و</span> connect
          only on their right side — they never join to the letter that follows, so a
          word visibly “breaks” after them.
        </Note>
        <Note title="Taa marbuta — ة">
          A feminine ending written at the end of a word. It usually sounds like a soft
          “a”.
        </Note>
        <Note title="The word “the” — الـ">
          “el / il” attaches to the front of a word, e.g.{" "}
          <span style={{ fontFamily: arFont, fontSize: 18, direction: "rtl" }}>البيت</span>{" "}
          (<i>el-beet</i>, “the house”).
        </Note>
        <Note title="Short vowels (harakat)">
          Tiny marks above and below letters for a, i, u sounds. Everyday writing leaves
          them out, so you read them from context — which is exactly why drilling
          vocabulary pays off.
        </Note>
        <Note title="Texting informally (Franco-Arabic)">
          Egyptians often type in Latin letters, using numbers for sounds with no English
          letter: 3 = ع, 7 = ح, 2 = hamza/ق, 5 = خ, 6 = ط. So{" "}
          <span style={{ fontFamily: arFont, fontSize: 18, direction: "rtl" }}>عايز</span>{" "}
          (<i>ʿaayez</i>, “I want”) gets typed <b style={{ color: T.text }}>3ayez</b>.
        </Note>
      </div>

      <div style={{ fontSize: 11, color: T.textDim, textAlign: "center", marginTop: 20, lineHeight: 1.6 }}>
        Audio uses your device's built-in Arabic voice. If you hear nothing, your phone or
        browser may not have an Arabic voice installed — lean on the transliteration and
        the sound notes above.
      </div>
    </div>
  );
}

function Note({ title, children }) {
  return (
    <div
      style={{
        background: T.panel,
        border: `1px solid ${T.line}`,
        borderRadius: 12,
        padding: "11px 14px",
      }}
    >
      <div style={{ color: T.gold, fontWeight: 700, fontSize: 13, marginBottom: 4 }}>
        {title}
      </div>
      <div style={{ color: T.text }}>{children}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
