const T = { ...THEMES.rose };
function applyTheme(name) {

function speak(text) {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices() || [];
    const v =
      voices.find((x) => x.lang && x.lang.toLowerCase().startsWith("ar-eg")) ||
      voices.find((x) => x.lang && x.lang.toLowerCase().startsWith("ar"));
    if (v) u.voice = v;
    u.lang = v ? v.lang : "ar-EG";
    u.rate = 0.82;
    window.speechSynthesis.speak(u);
  } catch {
    /* ignore */
  }
}

function Speaker({ text, size = 18, color = "#c02e80" }) {
  return (
    <button
      className="tap"
      aria-label="Play pronunciation"
      onClick={(e) => {
        e.stopPropagation();
        speak(text);
      }}
      style={{
        border: `1px solid ${color}66`,
        background: `${color}1f`,
        color,
        borderRadius: 999,
        width: size + 18,
        height: size + 18,
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        fontSize: size,
        cursor: "pointer",
        flexShrink: 0,
      }}
    >
      🔊
    </button>
  );
}

/* ---- Positional shapes as first-class SRS items ----
   Each letter is quizzed/tracked per shape: isolated, initial, medial, final.
   Six "one-way" letters never join on the left, so they only have two distinct
   shapes (isolated, final) — for those, initial folds into isolated and medial
   into final. A "form token" is array-compatible ([glyph,name,tr,note,...]) so it
   drops straight into the existing quiz code, with extra fields for the shape. */
const NONCONNECT = new Set(["ا", "د", "ذ", "ر", "ز", "و"]);
const FORM_LABEL = { iso: "isolated", ini: "initial", med: "medial", fin: "final" };
const FORM_SHORT = { iso: "iso", ini: "init", med: "med", fin: "fin" };
function distinctForms(glyph) { return NONCONNECT.has(glyph) ? ["iso", "fin"] : ["iso", "ini", "med", "fin"]; }
function effForm(glyph, form) { if (NONCONNECT.has(glyph)) { if (form === "ini") return "iso"; if (form === "med") return "fin"; } return form; }
function formKeyOf(glyph, form) { return glyph + ":" + effForm(glyph, form); }
function formToken(glyph, form, row) {
  const ef = effForm(glyph, form);
  const shape = letterForms(glyph)[ef];
  const key = glyph + ":" + ef;
  const t = [glyph, row[1], row[2], row[3], shape, key, FORM_LABEL[ef]];
  t.glyph = glyph; t.form = ef; t.shape = shape; t.key = key; t.label = FORM_LABEL[ef];
  return t;
}
function buildForms(rows) {
  const out = [];
  for (const row of rows) for (const f of distinctForms(row[0])) out.push(formToken(row[0], f, row));
  return out;
}
const SCRIPT_FORMS = buildForms(ALPHABET);
// read a form's progress, falling back to legacy per-letter progress so old data migrates
function formProg(prog, tok) { return normLP(prog[tok[5]]) || normLP(prog[tok[0]]) || null; }
function letterLearnedIn(prog, glyph) { return distinctForms(glyph).every((f) => prog[glyph + ":" + f] || prog[glyph]); }

/* ---- Time + dates ---- */
const HOUR = 3600000;
const DAY = 86400000;
const todayStr = () => new Date().toISOString().slice(0, 10);
const shiftDay = (s, n) => {
  const d = new Date(s + "T00:00:00Z");
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
};

/* ---- Arabic answer normalization (forgiving grading) ---- */
function normTr(s) {
  if (!s) return "";
  return s
    .toLowerCase()
    .replace(/[ʿʾʼʔʕ'`’ʻ]/g, "")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9 ]/g, "")
    .replace(/(.)\1+/g, "$1") // collapse doubled letters (habiibi -> habibi)
    .replace(/\s+/g, " ")
    .trim();
}
function normAr(s) {
  if (!s) return "";
  return s
    .replace(/[\u064B-\u0652\u0670]/g, "")
    .replace(/\u0640/g, "")
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ء/g, "")
    .replace(/[^\u0600-\u06FF ]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}
function answerMatches(input, item) {
  const a = normAr(input);
  if (!a) return false;
  if (a === normAr(item.ar)) return true;
  return (item.alts || []).some((x) => normAr(x) === a);
}

/* ---- SRS stages (WaniKani-style) ---- */
const STAGE_MS = {
  1: 2 * HOUR,
  2: 4 * HOUR,
  3: 8 * HOUR,
  4: 23 * HOUR,
  5: 3 * DAY,
  6: 7 * DAY,
  7: 14 * DAY,
  8: 30 * DAY,
  9: Infinity,
};
function stageMeta(stage) {
  if (stage >= 9) return { group: "Burned", short: "Burned", color: T.textDim };
  if (stage >= 8) return { group: "Enlightened", short: "Enlightened", color: T.goldSoft };
  if (stage >= 7) return { group: "Master", short: "Master", color: T.gold };
  if (stage >= 5) return { group: "Guru", short: "Guru " + (stage - 4), color: T.terra };
  if (stage >= 1) return { group: "Apprentice", short: "Apprentice " + stage, color: T.pink };
  return { group: "Locked", short: "—", color: T.textDim };
}
const STAGE_GROUPS = ["Apprentice", "Guru", "Master", "Enlightened", "Burned"];
function learnItem(now) {
  return { stage: 1, due: now + STAGE_MS[1], correct: 0, wrong: 0, recentWrong: 0, learnedAt: now };
}
function reviewSchedule(prog, correct, now) {
  let stage = prog ? prog.stage : 1;
  // Correct → climb one rung. Miss → lose half your progress (50% setback), rounded.
  stage = correct ? Math.min(9, stage + 1) : Math.max(1, Math.round(stage / 2));
  const ms = STAGE_MS[stage];
  return {
    stage,
    due: ms === Infinity ? Infinity : now + ms,
    lastReviewed: now,
    learnedAt: prog ? prog.learnedAt : now,
    correct: (prog ? prog.correct : 0) + (correct ? 1 : 0),
    wrong: (prog ? prog.wrong : 0) + (correct ? 0 : 1),
    recentWrong: correct ? 0 : (prog ? prog.recentWrong || 0 : 0) + 1,
  };
}
function isLeech(prog) {
  return !!prog && (prog.recentWrong || 0) >= 2;
}
// How far up the SRS ladder (0–100%). Burned = 100%.
function masteryPct(prog) {
  const st = prog && prog.stage ? prog.stage : 0;
  return Math.round((st / 9) * 100);
}
// Traffic-light mastery: red = struggling, green = never missed, amber = recovering.
function masteryColor(prog) {
  if (!prog) return null;
  if ((prog.recentWrong || 0) >= 2) return T.red;
  if ((prog.wrong || 0) === 0) return T.green;
  return T.amber;
}
function masteryLabel(prog) {
  if (!prog) return "";
  if ((prog.recentWrong || 0) >= 2) return "needs work";
  if ((prog.wrong || 0) === 0) return "solid";
  return "improving";
}
function fmtUntil(due, now) {
  if (due === Infinity) return "burned";
  const d = due - now;
  if (d <= 0) return "now";
  if (d < HOUR) return Math.max(1, Math.round(d / 60000)) + "m";
  if (d < DAY) return Math.round(d / HOUR) + "h";
  return Math.round(d / DAY) + "d";
}

/* ===================== TYPED QUIZ (reused everywhere) ===================== */
function TypedQuiz({ items, mode, onGrade, onExit, title }) {
  const [queue, setQueue] = useState(() => items);
  const [streak, setStreak] = useState({}); // id -> consecutive correct this session
  const [missed, setMissed] = useState({}); // id -> ever missed this session
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [leveled, setLeveled] = useState(null);
  const [done, setDone] = useState(items.length === 0);

  const item = queue[0];
  const total = items.length;
  const masteredCount = items.filter((it) => (streak[it.id] || 0) >= 2).length;
  const curStreak = item ? streak[item.id] || 0 : 0;

  const grade = (ok) => {
    if (feedback) return;
    setFeedback(ok ? "correct" : "wrong");
    setStreak((s) => ({ ...s, [item.id]: ok ? (s[item.id] || 0) + 1 : 0 }));
    if (!ok) setMissed((m) => ({ ...m, [item.id]: true }));
  };
  const next = () => {
    const st = streak[item.id] || 0; // updated post-grade
    let q;
    if (st >= 2) {
      // graduate: grade the SRS once, counting it wrong if it was ever missed this session
      const lvl = onGrade(item.id, !missed[item.id], mode);
      if (lvl) setLeveled(lvl);
      q = queue.slice(1);
    } else {
      q = [...queue.slice(1), item]; // not yet twice-in-a-row → retake later
    }
    setFeedback(null);
    setAnswer("");
    if (q.length === 0) setDone(true);
    else setQueue(q);
  };
  const submit = () => {
    if (feedback) { next(); return; }
    grade(answerMatches(answer, item));
  };
  const giveUp = () => { if (feedback) return; grade(false); };
  const retake = () => { setQueue(items); setStreak({}); setMissed({}); setAnswer(""); setFeedback(null); setLeveled(null); setDone(items.length === 0); };

  if (done) {
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>{items.length === 0 ? "🌙" : "🎉"}</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>{items.length === 0 ? "Nothing to quiz right now" : "All mastered!"}</div>
        {items.length > 0 && (
          <div style={{ color: T.textDim, fontSize: 14, marginTop: 8, lineHeight: 1.5 }}>You got every item right twice in a row — {total} item{total === 1 ? "" : "s"} cleared.</div>
        )}
        {leveled && (
          <div style={{ marginTop: 14, background: `${T.gold}14`, border: `1px solid ${T.gold}`, borderRadius: 14, padding: "12px 14px", color: T.gold, fontWeight: 700 }}>
            🎊 Level up! You reached Level {leveled} — new words unlocked.
          </div>
        )}
        {items.length > 0 && (
          <button className="tap" onClick={retake} style={{ width: "100%", marginTop: 18, padding: 13, borderRadius: 13, border: `1px solid ${T.gold}`, background: `${T.gold}10`, color: T.gold, fontWeight: 700 }}>🔁 Retake this set</button>
        )}
        <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 10, padding: 14, borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Back to home</button>
      </div>
    );
  }

  const correct = feedback === "correct";
  const wrong = feedback === "wrong";
  const willFinish = correct && curStreak >= 2 && queue.length === 1;

  return (
    <div className="fade">
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.goldSoft, whiteSpace: "nowrap" }}>{title}</div>
        <div style={{ flex: 1, height: 4, background: T.line, borderRadius: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(masteredCount / Math.max(1, total)) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})`, transition: "width .3s ease" }} />
        </div>
        <div style={{ fontSize: 12, color: T.textDim, whiteSpace: "nowrap" }}>{masteredCount}/{total} mastered</div>
      </div>

      <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 20, padding: "22px 18px", textAlign: "center", boxShadow: "0 12px 30px rgba(128,29,92,.08)" }}>
        <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>Type in Arabic · {item.type}</div>
        <div style={{ fontFamily: displayFont, fontSize: 24, color: T.text, marginTop: 8 }}>{item.en}</div>
        <div style={{ marginTop: 8, fontSize: 11, color: curStreak >= 1 ? T.green : T.textDim, fontWeight: 600 }}>{curStreak >= 1 ? "✓ 1/2 in a row — one more to clear" : "Get this right twice in a row to clear it"}</div>
      </div>

      <input
        value={answer}
        onChange={(e) => !feedback && setAnswer(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && submit()}
        placeholder="اكتب بالعربي…"
        dir="rtl"
        readOnly={!!feedback}
        style={{ width: "100%", marginTop: 12, padding: "14px 16px", borderRadius: 14, border: `2px solid ${correct ? T.green : wrong ? T.red : T.line}`, background: correct ? `${T.green}10` : wrong ? `${T.red}10` : T.panel, color: T.text, fontFamily: arFont, fontSize: 26, outline: "none", textAlign: "right" }}
      />

      {feedback && (
        <div className="fade" style={{ marginTop: 12, background: T.panel, border: `1px solid ${wrong ? T.red : T.green}`, borderRadius: 14, padding: "12px 14px", textAlign: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: wrong ? T.red : T.green }}>{correct ? (curStreak >= 2 ? "Correct — cleared! ✓✓" : "Correct! Once more to clear it") : "Not quite — you'll see it again"}</div>
          <div style={{ fontFamily: arFont, fontSize: 30, color: T.text, direction: "rtl", marginTop: 4 }}>{item.ar}</div>
          <div style={{ color: T.goldSoft, fontStyle: "italic", fontSize: 14 }}>{item.tr}</div>
          <div style={{ marginTop: 8 }}><Speaker text={item.ar} color={T.terra} /></div>
        </div>
      )}

      {!feedback && (
        <ArabicKeyboard
          onKey={(ch) => setAnswer((a) => a + ch)}
          onSpace={() => setAnswer((a) => a + " ")}
          onBack={() => setAnswer((a) => a.slice(0, -1))}
          onClear={() => setAnswer("")}
        />
      )}

      <button className="tap" onClick={submit} style={{ width: "100%", marginTop: 12, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}>
        {feedback ? (willFinish ? "Finish" : "Next →") : "Check answer"}
      </button>
      {!feedback && (
        <button className="tap" onClick={giveUp} style={{ width: "100%", marginTop: 8, padding: 11, borderRadius: 12, border: `1px solid ${T.line}`, background: "transparent", color: T.textDim, fontSize: 13, fontWeight: 600 }}>
          I don't know — show me
        </button>
      )}
      <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 8, padding: 9, borderRadius: 12, border: "none", background: "transparent", color: T.textDim, fontSize: 12 }}>
        End session
      </button>
      <div style={{ textAlign: "center", fontSize: 11, color: T.textDim, marginTop: 10, lineHeight: 1.6 }}>
        Each item must be answered correctly <b style={{ color: T.text }}>twice in a row</b> to clear — miss it and the streak resets.
      </div>
    </div>
  );
}
