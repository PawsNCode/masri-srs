          You've learned everything unlocked so far. Master your current level in Reviews (reach Guru on 90%) to unlock the next set.
        </div>
        <button className="tap" onClick={onExit} style={{ width: "100%", marginTop: 18, padding: 13, borderRadius: 12, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Home</button>
      </div>
    );
  }

  if (phase === "quiz") {
    return (
      <div>
        <div style={{ textAlign: "center", fontSize: 12.5, color: T.textDim, margin: "0 0 12px", lineHeight: 1.5 }}>
          Now type each one in Arabic to lock it in 👇
        </div>
        <TypedQuiz items={queue} mode="srs" onGrade={onGrade} onExit={onExit} title="Lesson quiz" />
      </div>
    );
  }

  // teach phase
  const item = queue[i];
  return (
    <div className="fade">
      <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
        <div style={{ height: "100%", width: `${(i / queue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})` }} />
      </div>
      <div className="pop" key={item.id} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "30px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)" }}>
        <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>New {item.type} · Level {item.level}</div>
        <div style={{ fontFamily: arFont, fontSize: item.type === "sentence" ? 32 : 48, color: T.text, direction: "rtl", margin: "14px 0", lineHeight: 1.4 }}>{item.ar}</div>
        <div style={{ color: T.goldSoft, fontStyle: "italic", fontSize: 16 }}>{item.tr}</div>
        <div style={{ fontFamily: displayFont, fontSize: 20, marginTop: 6 }}>{item.en}</div>
        <div style={{ marginTop: 14 }}><Speaker text={item.ar} size={20} color={T.gold} /></div>
      </div>
      <button
        className="tap"
        onClick={() => {
          onLearn(item.id);
          if (i + 1 >= queue.length) setPhase("quiz");
          else setI(i + 1);
        }}
        style={{ width: "100%", marginTop: 14, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}
      >
        {i + 1 >= queue.length ? "Got them — start quiz →" : "Learn it ✓"}
      </button>
      <div style={{ textAlign: "center", fontSize: 12, color: T.textDim, marginTop: 10 }}>Learning {i + 1} of {queue.length}</div>
    </div>
  );
}

/* ===================== HOME ===================== */
function HomeView({ state, level, levelPct, lessons, reviews, leeches, stageCounts, streak, onGo, onTrouble, onSetting, onTheme, onImport, onReset }) {
  const [confirm, setConfirm] = useState(false);
  const [backupOpen, setBackupOpen] = useState(false);
  const [importText, setImportText] = useState("");
  const [msg, setMsg] = useState("");
  const fileRef = useRef(null);

  const downloadBackup = () => {
    try {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `masri-srs-backup-${todayStr()}.json`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
      setMsg("✓ Backup file downloaded.");
    } catch (e) { setMsg("Couldn't download here — use Copy instead."); }
  };
  const copyBackup = async () => {
    const text = JSON.stringify(state);
    try { await navigator.clipboard.writeText(text); setMsg("✓ Backup copied to clipboard."); }
    catch (e) { setImportText(text); setMsg("Select the text below and copy it manually."); }
  };
  const showBackupText = () => { setImportText(JSON.stringify(state)); setMsg("Here's your backup text — copy and keep it safe."); };
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { setImportText(String(r.result || "")); setMsg("File loaded — tap Restore to apply."); };
    r.readAsText(f);
  };
  const doImport = () => {
    let obj;
    try { obj = JSON.parse(importText.trim()); }
    catch (e) { setMsg("⚠ Invalid backup text — make sure you copied all of it."); return; }
    if (!obj || typeof obj !== "object" || !("progress" in obj)) { setMsg("⚠ That doesn't look like a Masri backup."); return; }
    if (onImport(obj)) { setMsg("✓ Progress restored!"); setImportText(""); }
  };

  return (
    <div className="fade">
      <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 20, padding: "18px 18px 16px", marginBottom: 14, boxShadow: "0 12px 30px rgba(128,29,92,.08)" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <div style={{ fontFamily: displayFont, fontSize: 26, color: T.gold }}>Level {level}</div>
          <div style={{ fontSize: 13, color: T.textDim }}>{LEVEL_TITLES[level] || ""}</div>
        </div>
        <div style={{ margin: "12px 0 6px" }}><Bar pct={levelPct} /></div>
        <div style={{ fontSize: 12, color: T.textDim }}>
          {level >= MAX_LEVEL ? "Final level — master everything to finish!" : `${Math.round(levelPct * 100)}% mastered · reach 90% Guru to unlock Level ${level + 1}`}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
        {[["Lessons", lessons, "lessons", "Learn + quiz"], ["Reviews", reviews, "reviews", "What's due now"]].map(([label, n, key, sub]) => (
          <button key={key} className="tap" onClick={() => n > 0 && onGo(key)} style={{ flex: 1, textAlign: "left", borderRadius: 18, padding: "16px 16px", cursor: n > 0 ? "pointer" : "default", color: n > 0 ? "#fff" : T.textDim, background: n > 0 ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel, boxShadow: n > 0 ? "0 8px 20px rgba(128,29,92,.18)" : "none", border: n > 0 ? "none" : `1px solid ${T.line}` }}>
            <div style={{ fontSize: 30, fontWeight: 800, lineHeight: 1 }}>{n}</div>
            <div style={{ fontSize: 14, fontWeight: 700, marginTop: 6 }}>{label}</div>
            <div style={{ fontSize: 11, opacity: 0.85, marginTop: 1 }}>{sub}</div>
          </button>
        ))}
      </div>

      <button className="tap" onClick={() => leeches > 0 && onTrouble()} style={{ width: "100%", marginBottom: 14, padding: "13px 16px", borderRadius: 14, border: `1px solid ${leeches > 0 ? T.red : T.line}`, background: leeches > 0 ? `${T.red}0f` : T.panel, color: leeches > 0 ? T.red : T.textDim, fontSize: 13.5, fontWeight: 700, cursor: leeches > 0 ? "pointer" : "default", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>🔁 Trouble words {leeches > 0 ? `(${leeches})` : ""}</span>
        <span style={{ fontSize: 12, fontWeight: 600, opacity: 0.8 }}>{leeches > 0 ? "drill these →" : "none right now"}</span>
      </button>

      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {STAGE_GROUPS.map((g) => (
          <div key={g} style={{ flex: 1, background: T.panel, border: `1px solid ${T.line}`, borderRadius: 12, padding: "10px 4px", textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: stageMeta(g === "Apprentice" ? 1 : g === "Guru" ? 5 : g === "Master" ? 7 : g === "Enlightened" ? 8 : 9).color }}>{stageCounts[g] || 0}</div>
            <div style={{ fontSize: 9.5, color: T.textDim, marginTop: 2 }}>{g}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <Stat label="Streak" value={`${streak}🔥`} color={T.terra} />
        <Stat label="Reviews today" value={state.daily.reviews} color={T.gold} />
        <Stat label="Lessons today" value={state.daily.lessons} color={T.pink} />
      </div>

      <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: 16, marginBottom: 14 }}>
        <button className="tap" onClick={() => { setBackupOpen((o) => !o); setMsg(""); }} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", border: "none", background: "transparent", padding: 0, cursor: "pointer", color: T.text }}>
          <span style={{ fontSize: 13, color: T.textDim }}>💾 Backup &amp; restore</span>
          <span style={{ fontSize: 12, color: T.gold, fontWeight: 700 }}>{backupOpen ? "Hide" : "Open"}</span>
        </button>
        {backupOpen && (
          <div className="fade" style={{ marginTop: 12 }}>
            <div style={{ fontSize: 11.5, color: T.textDim, lineHeight: 1.6, marginBottom: 10 }}>
              Save a copy of all your progress (levels, SRS, custom quizzes, settings). Keep the file or text somewhere safe, then restore it any time — even on a new phone.
            </div>
            <div style={{ fontSize: 12, color: T.gold, fontWeight: 700, marginBottom: 6 }}>Export</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <button className="tap" onClick={downloadBackup} style={{ flex: 1, padding: 11, borderRadius: 11, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 13, fontWeight: 700 }}>Download file</button>
              <button className="tap" onClick={copyBackup} style={{ flex: 1, padding: 11, borderRadius: 11, border: `1px solid ${T.line}`, background: T.panelHi, color: T.text, fontSize: 13, fontWeight: 600 }}>Copy</button>
              <button className="tap" onClick={showBackupText} style={{ flex: 1, padding: 11, borderRadius: 11, border: `1px solid ${T.line}`, background: T.panelHi, color: T.text, fontSize: 13, fontWeight: 600 }}>Show text</button>
            </div>
            <div style={{ fontSize: 12, color: T.gold, fontWeight: 700, margin: "12px 0 6px" }}>Import</div>
            <input ref={fileRef} type="file" accept=".json,application/json" onChange={onFile} style={{ display: "none" }} />
            <button className="tap" onClick={() => fileRef.current && fileRef.current.click()} style={{ width: "100%", padding: 11, borderRadius: 11, border: `1px dashed ${T.gold}`, background: `${T.gold}0d`, color: T.gold, fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Choose backup file…</button>
            <textarea value={importText} onChange={(e) => setImportText(e.target.value)} placeholder="…or paste your backup text here" rows={3} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${T.line}`, background: T.panelHi, color: T.text, fontSize: 11.5, fontFamily: "ui-monospace, monospace", outline: "none", resize: "vertical" }} />
            <button className="tap" disabled={!importText.trim()} onClick={doImport} style={{ width: "100%", marginTop: 8, padding: 12, borderRadius: 11, border: "none", background: importText.trim() ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.line, color: importText.trim() ? "#fff" : T.textDim, fontSize: 14, fontWeight: 700 }}>Restore this backup</button>
            <div style={{ fontSize: 11, color: T.textDim, marginTop: 8, lineHeight: 1.5 }}>Restoring replaces your current progress with the backup.</div>
            {msg && <div style={{ fontSize: 12, color: msg[0] === "⚠" ? T.red : T.gold, fontWeight: 600, marginTop: 8 }}>{msg}</div>}
          </div>
        )}
      </div>

      <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: 16, marginBottom: 14 }}>
        <div style={{ fontSize: 13, color: T.textDim, marginBottom: 4 }}>Learning phase</div>
        <div style={{ fontSize: 11.5, color: T.textDim, marginBottom: 12, lineHeight: 1.5 }}>
          How many new words you learn before each lesson quiz.
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 14 }}>New words per quiz</span>
          <div style={{ display: "flex", gap: 8 }}>
            {[3, 5, 7, 10].map((n) => (
              <button key={n} className="tap" onClick={() => onSetting({ lessonBatch: n })} style={{ border: `1px solid ${state.settings.lessonBatch === n ? T.gold : T.line}`, background: state.settings.lessonBatch === n ? `${T.gold}18` : "transparent", color: state.settings.lessonBatch === n ? T.gold : T.textDim, borderRadius: 9, padding: "6px 11px", fontSize: 13, fontWeight: 600 }}>{n}</button>
            ))}
          </div>
        </div>
        <div style={{ marginTop: 14 }}>
          {!confirm ? (
            <button className="tap" onClick={() => setConfirm(true)} style={{ width: "100%", padding: 12, borderRadius: 11, border: `1px solid ${T.red}55`, background: "transparent", color: T.red, fontSize: 13, fontWeight: 600 }}>Reset all progress</button>
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <button className="tap" onClick={() => setConfirm(false)} style={{ flex: 1, padding: 12, borderRadius: 11, border: `1px solid ${T.line}`, background: T.panel, color: T.text, fontSize: 13, fontWeight: 600 }}>Cancel</button>
              <button className="tap" onClick={() => { onReset(); setConfirm(false); }} style={{ flex: 1, padding: 12, borderRadius: 11, border: "none", background: T.red, color: "#fff", fontSize: 13, fontWeight: 700 }}>Yes, reset</button>
            </div>
          )}
        </div>
      </div>

      <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: 16 }}>
        <div style={{ fontSize: 13, color: T.textDim, marginBottom: 12 }}>Theme</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {THEME_LIST.map(([key, name]) => {
            const pal = THEMES[key];
            const active = state.settings.theme === key;
            return (
              <button key={key} className="tap" onClick={() => onTheme(key)} style={{ display: "flex", alignItems: "center", gap: 7, border: `1.5px solid ${active ? T.gold : T.line}`, background: active ? `${T.gold}14` : T.panelHi, borderRadius: 999, padding: "6px 12px 6px 7px", fontSize: 12.5, fontWeight: 600, color: active ? T.gold : T.textDim }}>
                <span style={{ width: 18, height: 18, borderRadius: 999, background: `linear-gradient(135deg, ${pal.gold}, ${pal.terra})`, border: `2px solid ${pal.bg}`, boxShadow: `0 0 0 1px ${pal.line}` }} />
                {name}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ===================== ITEMS (browse + select-to-quiz + add) ===================== */
function ItemsView({ allItems, state, level, leeches, onAdd, onStartPractice, customItems, onToggleCustom, onStartCustom, onClearCustom }) {
  const [filter, setFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [ar, setAr] = useState("");
  const [tr, setTr] = useState("");
  const [en, setEn] = useState("");
  const now = Date.now();
  const levels = ["all", ...Array.from({ length: MAX_LEVEL }, (_, k) => k + 1)];
  const raw = query.trim();
  const ql = raw.toLowerCase();
  const qar = normAr(raw);
  const qtr = normTr(raw);
  const shown = allItems.filter((it) => {
    if (!raw) return filter === "all" || it.level === filter;
    const enHit = it.en.toLowerCase().includes(ql);
    const trHit = qtr.length > 0 && (normTr(it.tr).includes(qtr) || (it.alts || []).some((a) => normTr(a).includes(qtr)));
    const arHit = qar.length > 0 && (normAr(it.ar).includes(qar) || (it.alts || []).some((a) => normAr(a).includes(qar)));
    return enHit || trHit || arHit;
  });
  const countByLevel = {};
  allItems.forEach((it) => { countByLevel[it.level] = (countByLevel[it.level] || 0) + 1; });
  const totalCount = allItems.length;
  const inCustom = (id) => customItems.includes(id);

  const badge = (it) => {
    const locked = it.level > level && !it.custom;
    const p = state.progress[it.id];
    if (locked) return { t: "🔒", c: T.textDim };
    if (!p) return { t: "new", c: T.pink };
    if (isLeech(p)) return { t: "⚠ " + stageMeta(p.stage).short, c: T.red };
    return { t: p.due === Infinity ? "burned" : stageMeta(p.stage).short, c: stageMeta(p.stage).color };
  };

  return (
    <div className="fade">
      <div style={{ position: "relative", marginBottom: 10 }}>
        <input
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Search English or Arabic…"
          style={{ width: "100%", padding: "12px 38px 12px 14px", borderRadius: 12, border: `1px solid ${T.line}`, background: T.panel, color: T.text, fontSize: 14, outline: "none" }}
        />
        {raw ? (
          <button className="tap" onClick={() => setQuery("")} aria-label="clear search" style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", border: "none", background: "transparent", color: T.textDim, fontSize: 18, cursor: "pointer", lineHeight: 1 }}>×</button>
        ) : (
          <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: T.textDim, fontSize: 14, pointerEvents: "none" }}>🔍</span>
        )}
      </div>

      {raw ? (
        <div style={{ fontSize: 11.5, color: T.textDim, margin: "0 2px 8px" }}>
          {shown.length} match{shown.length === 1 ? "" : "es"} across all levels
        </div>
      ) : (
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, marginBottom: 4 }}>
          {levels.map((l) => (
            <button key={l} className="tap" onClick={() => setFilter(l)} style={{ whiteSpace: "nowrap", border: `1px solid ${filter === l ? T.gold : T.line}`, background: filter === l ? `${T.gold}18` : "transparent", color: filter === l ? T.gold : T.textDim, borderRadius: 20, padding: "6px 13px", fontSize: 12.5, fontWeight: 600 }}>{l === "all" ? `All (${totalCount})` : `Lv ${l} (${countByLevel[l] || 0})`}</button>
          ))}
        </div>
      )}

      {customItems.length > 0 && (
        <div style={{ position: "sticky", top: 0, zIndex: 5, marginBottom: 10, padding: "8px 0", background: T.bg }}>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="tap" onClick={onStartCustom} style={{ flex: 1, padding: "13px 16px", borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700, fontSize: 14, boxShadow: "0 8px 20px rgba(128,29,92,.18)" }}>★ Start custom quiz ({customItems.length})</button>
            <button className="tap" onClick={onClearCustom} style={{ padding: "13px 16px", borderRadius: 13, border: `1px solid ${T.line}`, background: T.panel, color: T.textDim, fontWeight: 600, fontSize: 13 }}>Clear</button>
          </div>
        </div>
      )}

      {leeches > 0 && (
        <button className="tap" onClick={() => onStartPractice("leeches")} style={{ width: "100%", marginBottom: 10, padding: 11, borderRadius: 12, border: `1px solid ${T.red}`, background: `${T.red}0f`, color: T.red, fontSize: 13, fontWeight: 700 }}>
          🔁 Quiz my trouble words ({leeches})
        </button>
      )}

      <button className="tap" onClick={() => setShowAdd((s) => !s)} style={{ width: "100%", marginBottom: 12, padding: 11, borderRadius: 12, border: `1px dashed ${T.gold}`, background: `${T.gold}0d`, color: T.gold, fontSize: 13, fontWeight: 600 }}>{showAdd ? "Close" : "+ Add your own card"}</button>

      {showAdd && (
        <div className="fade" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
          {[["Arabic", ar, setAr, true, "اكتب هنا"], ["Transliteration", tr, setTr, false, "e.g. ezzaay"], ["English meaning", en, setEn, false, "e.g. How"]].map(([label, val, set, rtl, ph]) => (
            <div key={label} style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 11.5, color: T.textDim, marginBottom: 4 }}>{label}</div>
              <input value={val} onChange={(e) => set(e.target.value)} placeholder={ph} dir={rtl ? "rtl" : "ltr"} style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${T.line}`, background: T.panelHi, color: T.text, fontSize: rtl ? 20 : 14, fontFamily: rtl ? arFont : "inherit", outline: "none" }} />
            </div>
          ))}
          <button className="tap" disabled={!ar.trim() || !en.trim()} onClick={() => { onAdd({ id: "u" + Date.now(), level, type: "word", ar: ar.trim(), tr: tr.trim() || "—", en: en.trim(), alts: [], custom: true }); setAr(""); setTr(""); setEn(""); setShowAdd(false); }} style={{ width: "100%", padding: 12, borderRadius: 11, border: "none", background: ar.trim() && en.trim() ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.line, color: ar.trim() && en.trim() ? "#fff" : T.textDim, fontWeight: 700, fontSize: 14 }}>Add to Level {level}</button>
        </div>
      )}

      <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: "4px 12px", margin: "2px 2px 8px", fontSize: 11 }}>
        <span style={{ color: T.textDim }}>Mastery:</span>
        {[[T.green, "solid"], [T.amber, "improving"], [T.red, "needs work"]].map(([c, label]) => (
          <span key={label} style={{ display: "inline-flex", alignItems: "center", gap: 5, color: T.textDim }}>
            <span style={{ width: 9, height: 9, borderRadius: 3, background: c }} />{label}
          </span>
        ))}
        <span style={{ color: T.textDim, marginLeft: "auto" }}>★ adds to custom quiz</span>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {shown.map((it) => {
          const b = badge(it);
          const picked = inCustom(it.id);
          const p = state.progress[it.id];
          const locked = it.level > level && !it.custom;
          const mc = !locked && p ? masteryColor(p) : null;
          const pct = !locked && p ? masteryPct(p) : null;
          return (
            <div key={it.id} style={{ background: picked ? `${T.gold}0d` : T.panel, border: `1px solid ${picked ? T.gold : T.line}`, borderLeft: mc ? `5px solid ${mc}` : `1px solid ${picked ? T.gold : T.line}`, borderRadius: 13, padding: "11px 13px", display: "flex", alignItems: "center", gap: 10 }}>
              <button className="tap" onClick={() => onToggleCustom(it.id)} aria-label="add to custom quiz" title="Add to custom quiz" style={{ width: 24, height: 24, borderRadius: 999, flexShrink: 0, cursor: "pointer", border: `2px solid ${picked ? T.gold : T.line}`, background: picked ? T.gold : "transparent", color: picked ? "#fff" : T.textDim, fontSize: 13, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>★</button>
              <button className="tap" onClick={() => speak(it.ar)} aria-label="play" style={{ background: "transparent", border: "none", padding: 0, cursor: "pointer", minWidth: 74, display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ fontFamily: arFont, fontSize: 22, direction: "rtl", color: T.text }}>{it.ar}</span>
                <span style={{ fontSize: 10, color: T.goldSoft }}>🔊</span>
              </button>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, color: T.text }}>{it.en}</div>
                <div style={{ fontSize: 11.5, color: T.goldSoft, fontStyle: "italic" }}>{it.tr}</div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3 }}>
                <div style={{ fontSize: 10, color: b.c, border: `1px solid ${b.c}55`, borderRadius: 7, padding: "2px 7px", fontWeight: 700, whiteSpace: "nowrap" }}>{b.t}</div>
                {pct != null && (
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <span style={{ width: 7, height: 7, borderRadius: 999, background: mc }} />
                    <span style={{ fontSize: 9.5, color: T.textDim, fontWeight: 600 }}>{pct}%</span>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== STATS / PROGRESS REPORT ===================== */
function MiniBars({ series, color, unit }) {
  const max = Math.max(1, ...series);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 64 }}>
      {series.map((v, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "flex-end", height: "100%" }} title={`${v} ${unit || ""}`}>
          <div style={{ height: `${(v / max) * 100}%`, minHeight: v ? 4 : 2, background: v ? `linear-gradient(180deg, ${T.gold}, ${T.terra})` : T.line, borderRadius: 3 }} />
        </div>
      ))}
    </div>
  );
}

function StatsView({ state, allItems, level, streak }) {
  const now = Date.now();
  const prog = state.progress;
  const totalApp = ITEMS.length;
  const stageOf = (it) => prog[it.id]?.stage || 0;

  const learned = allItems.filter((it) => prog[it.id]).length;
  const mastered = allItems.filter((it) => stageOf(it) >= 5).length;
  const burned = allItems.filter((it) => stageOf(it) >= 9).length;
  const due = allItems.filter((it) => { const p = prog[it.id]; return p && p.due !== Infinity && p.due <= now; }).length;
  const next24 = allItems.filter((it) => { const p = prog[it.id]; return p && p.due !== Infinity && p.due > now && p.due <= now + DAY; }).length;
  const next7 = allItems.filter((it) => { const p = prog[it.id]; return p && p.due !== Infinity && p.due > now && p.due <= now + 7 * DAY; }).length;

  const levelItems = ITEMS.filter((it) => it.level === level);
  const levelGuru = levelItems.filter((it) => stageOf(it) >= 5).length;
  const levelPct = levelItems.length ? levelGuru / levelItems.length : 0;
  const appPct = totalApp ? mastered / totalApp : 0;
  const startedPct = totalApp ? Math.min(learned, totalApp) / totalApp : 0;

  // last 14 days
  const days = [];
  let d = todayStr();
  for (let k = 0; k < 14; k++) { days.unshift(d); d = shiftDay(d, -1); }
  const learnedByDay = {};
  allItems.forEach((it) => { const p = prog[it.id]; if (p && p.learnedAt) { const ds = new Date(p.learnedAt).toISOString().slice(0, 10); learnedByDay[ds] = (learnedByDay[ds] || 0) + 1; } });
  const learnSeries = days.map((ds) => learnedByDay[ds] || 0);
  const actSeries = days.map((ds) => state.history[ds] || 0);
  const newThisWeek = learnSeries.slice(-7).reduce((a, b) => a + b, 0);

  // calendar heatmap — last 8 weeks (most recent week at bottom)
  const calDays = [];
  let cd = todayStr();
  for (let k = 0; k < 56; k++) { calDays.unshift({ day: cd, n: state.history[cd] || 0 }); cd = shiftDay(cd, -1); }
  const weeks = [];
  for (let i = 0; i < calDays.length; i += 7) weeks.push(calDays.slice(i, i + 7));
  const heat = (n) => (n === 0 ? T.line : n < 3 ? `${T.pink}` : n < 7 ? T.terra : T.gold);

  const Ring = ({ pct, label, sub }) => (
    <div style={{ flex: 1, background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 18, padding: "16px 14px", textAlign: "center" }}>
      <div style={{ fontFamily: displayFont, fontSize: 30, color: T.gold, lineHeight: 1 }}>{Math.round(pct * 100)}%</div>
      <div style={{ margin: "10px 0 6px" }}><Bar pct={pct} h={6} /></div>
      <div style={{ fontSize: 12.5, fontWeight: 700 }}>{label}</div>
      <div style={{ fontSize: 11, color: T.textDim, marginTop: 1 }}>{sub}</div>
    </div>
  );

  return (
    <div className="fade">
      {/* completion rings */}
      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <Ring pct={appPct} label="Whole app" sub={`${mastered} / ${totalApp} mastered`} />
        <Ring pct={levelPct} label={`Level ${level}`} sub={`${levelGuru} / ${levelItems.length} mastered`} />
      </div>

      {/* key numbers */}
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <Stat label="Learned" value={learned} color={T.pink} />
        <Stat label="Mastered" value={mastered} color={T.terra} />
        <Stat label="Burned" value={burned} color="#444444" />
        <Stat label="Streak" value={`${streak}🔥`} color={T.gold} />
      </div>

      {/* review pipeline */}
      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <Stat label="Due now" value={due} color={due ? T.red : T.textDim} />
        <Stat label="Next 24h" value={next24} color={T.gold} />
        <Stat label="Next 7 days" value={next7} color={T.goldSoft} />
      </div>

      {/* new words learned */}
      <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: "16px 16px 12px", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
          <span style={{ fontSize: 13, color: T.textDim }}>New words — last 14 days</span>
          <span style={{ fontSize: 11.5, color: T.goldSoft, fontWeight: 700 }}>{newThisWeek} this week</span>
        </div>
        <MiniBars series={learnSeries} unit="new" />
      </div>

      {/* activity */}
      <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: "16px 16px 12px", marginBottom: 14 }}>
        <div style={{ fontSize: 13, color: T.textDim, marginBottom: 12 }}>Reviews &amp; lessons — last 14 days</div>
        <MiniBars series={actSeries} unit="answers" />
      </div>

      {/* calendar heatmap */}
      <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: "16px", marginBottom: 14 }}>
        <div style={{ fontSize: 13, color: T.textDim, marginBottom: 12 }}>Activity calendar — last 8 weeks</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {weeks.map((wk, wi) => (
            <div key={wi} style={{ display: "flex", gap: 4 }}>
              {wk.map((c) => (
                <div key={c.day} title={`${c.day}: ${c.n}`} style={{ flex: 1, aspectRatio: "1 / 1", borderRadius: 4, background: heat(c.n) }} />
              ))}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 5, marginTop: 10, fontSize: 10.5, color: T.textDim }}>
          less
          {[T.line, T.pink, T.terra, T.gold].map((c, i) => (<span key={i} style={{ width: 11, height: 11, borderRadius: 3, background: c, display: "inline-block" }} />))}
          more
        </div>
      </div>

      {/* per-level progress */}
      <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: "16px" }}>
        <div style={{ fontSize: 13, color: T.textDim, marginBottom: 12 }}>Progress by level</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 320, overflowY: "auto" }}>
          {Array.from({ length: MAX_LEVEL }, (_, k) => k + 1).map((l) => {
            const its = ITEMS.filter((it) => it.level === l);
            const g = its.filter((it) => (prog[it.id]?.stage || 0) >= 5).length;
            const pct = its.length ? g / its.length : 0;
            const locked = l > level;
            const done = pct >= 0.9;
            return (
              <div key={l} style={{ opacity: locked ? 0.5 : 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, marginBottom: 4 }}>
                  <span style={{ color: T.text }}>{locked ? "🔒 " : done ? "✓ " : ""}Lv {l} · {LEVEL_TITLES[l] || ""}</span>
                  <span style={{ color: T.textDim }}>{g}/{its.length}</span>
                </div>
                <Bar pct={pct} h={5} />
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ===================== REVIEWS HUB (choose what to review) ===================== */
function ReviewsHub({ dueLetters, dueWords, duePhrases, dueSentences, onLetters, onVocab, onGotoItems, onGotoScript }) {
  const totalVocab = dueWords.length + duePhrases.length + dueSentences.length;
  const totalAll = totalVocab + dueLetters;

  const Card = ({ label, sub, n, onTap, color }) => (
    <button className="tap" onClick={() => n > 0 && onTap()} style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", gap: 14, marginBottom: 10, borderRadius: 16, padding: "15px 16px", cursor: n > 0 ? "pointer" : "default", border: n > 0 ? "none" : `1px solid ${T.line}`, background: n > 0 ? `linear-gradient(135deg, ${color || T.gold}, ${T.terra})` : T.panel, color: n > 0 ? "#fff" : T.textDim, boxShadow: n > 0 ? "0 8px 20px rgba(128,29,92,.16)" : "none" }}>
      <div style={{ fontSize: 26, fontWeight: 800, minWidth: 38, textAlign: "center" }}>{n}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 15, fontWeight: 700 }}>{label}</div>
        <div style={{ fontSize: 11.5, opacity: 0.85, marginTop: 1 }}>{sub}</div>
      </div>
      <div style={{ fontSize: 18, opacity: 0.8 }}>{n > 0 ? "›" : ""}</div>
    </button>
  );

  return (
    <div className="fade">
      <div style={{ fontFamily: displayFont, fontSize: 21, marginBottom: 4 }}>What do you want to review?</div>
      <div style={{ fontSize: 12.5, color: T.textDim, marginBottom: 16 }}>
        {totalAll > 0 ? `${totalAll} item${totalAll === 1 ? "" : "s"} due across the app.` : "Nothing is due right now — great job. Check back later."}
      </div>

      <Card label="Letters (script)" sub="Due alphabet reviews" n={dueLetters} onTap={onLetters} color={T.pink} />
      <Card label="Words" sub="Single-word vocabulary" n={dueWords.length} onTap={() => onVocab(dueWords)} />
      <Card label="Phrases" sub="Short expressions" n={duePhrases.length} onTap={() => onVocab(duePhrases)} />
      <Card label="Sentences" sub="Full sentences" n={dueSentences.length} onTap={() => onVocab(dueSentences)} />
      <Card label="All vocabulary" sub="Words + phrases + sentences" n={totalVocab} onTap={() => onVocab([...dueWords, ...duePhrases, ...dueSentences])} color={T.gold} />

      <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 8 }}>
        <button className="tap" onClick={onGotoItems} style={{ width: "100%", padding: 12, borderRadius: 12, border: `1px dashed ${T.gold}`, background: `${T.gold}0d`, color: T.gold, fontSize: 13, fontWeight: 600 }}>
          ✓ Choose specific words to quiz →
        </button>
        <button className="tap" onClick={onGotoScript} style={{ width: "100%", padding: 12, borderRadius: 12, border: `1px dashed ${T.gold}`, background: `${T.gold}0d`, color: T.gold, fontSize: 13, fontWeight: 600 }}>
          ✓ Choose specific letters to quiz →
        </button>
      </div>
    </div>
  );
}

/* ===================== APP ===================== */
function App() {
  const [state, setState] = useState(null);
  const [view, setView] = useState("home");
  const [practiceItems, setPracticeItems] = useState([]);
  const [reviewRun, setReviewRun] = useState([]);
  const [scriptAuto, setScriptAuto] = useState(false);

  const stateRef = useRef(state);
  useEffect(() => { stateRef.current = state; }, [state]);

  useEffect(() => {
    let mounted = true;
    (async () => {
      const loaded = await loadState();
      let s = loaded || DEFAULT_STATE;
      if (s.daily?.date !== todayStr()) s = { ...s, daily: { date: todayStr(), reviews: 0, lessons: 0 } };
      s = { ...DEFAULT_STATE, ...s, settings: { ...DEFAULT_STATE.settings, ...(s.settings || {}) } };
      applyTheme(s.settings.theme || "rose");
      if (mounted) setState(s);
    })();
    return () => { mounted = false; };
  }, []);

  useEffect(() => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    return () => { if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = null; };
  }, []);

  const persist = useCallback((next) => { setState(next); saveState(next); }, []);
  const allItems = useMemo(() => [...ITEMS, ...((state && state.custom) || [])], [state]);

  const derived = useMemo(() => {
    if (!state) return null;
    const now = Date.now();
    const lvl = state.currentLevel;
    const pool = allItems.filter((it) => (it.custom || it.level <= lvl) && !state.progress[it.id]);
    const due = allItems.filter((it) => { const p = state.progress[it.id]; return p && p.due !== Infinity && p.due <= now; });
    const leechList = allItems.filter((it) => isLeech(state.progress[it.id]));
    const levelItems = ITEMS.filter((it) => it.level === lvl);
    const guru = levelItems.filter((it) => (state.progress[it.id]?.stage || 0) >= 5).length;
    const levelPct = levelItems.length ? guru / levelItems.length : 0;
    const stageCounts = {};
    allItems.forEach((it) => { const p = state.progress[it.id]; if (!p) return; const g = stageMeta(p.stage).group; stageCounts[g] = (stageCounts[g] || 0) + 1; });
    return { pool, due, leechList, levelPct, stageCounts };
  }, [state, allItems]);

  const streak = useMemo(() => {
    if (!state) return 0;
    let n = 0, day = todayStr();
    if (!state.history[day]) day = shiftDay(day, -1);
    while (state.history[day] > 0) { n++; day = shiftDay(day, -1); }
    return n;
  }, [state]);

  const commitLearn = useCallback((id) => {
    setState((s) => {
      const day = todayStr();
      const daily = s.daily.date === day ? s.daily : { date: day, reviews: 0, lessons: 0 };
      const next = { ...s, progress: { ...s.progress, [id]: learnItem(Date.now()) }, daily: { ...daily, lessons: daily.lessons + 1 } };
      saveState(next);
      return next;
    });
  }, []);

  const grade = useCallback((id, correct, mode) => {
    const s = stateRef.current;
    const prog = s.progress[id];
    if (!prog) return null;
    const now = Date.now();
    let cur = s.currentLevel;
    let leveled = null;
    let np;
    if (mode === "practice") {
      np = { ...prog, correct: prog.correct + (correct ? 1 : 0), wrong: prog.wrong + (correct ? 0 : 1), recentWrong: correct ? 0 : (prog.recentWrong || 0) + 1, lastReviewed: now };
    } else {
      np = reviewSchedule(prog, correct, now);
      const progress0 = { ...s.progress, [id]: np };
      const levelItems = ITEMS.filter((it) => it.level === cur);
      const guru = levelItems.filter((it) => (progress0[it.id]?.stage || 0) >= 5).length;
      if (levelItems.length && guru / levelItems.length >= 0.9 && cur < MAX_LEVEL) { cur += 1; leveled = cur; }
    }
    const day = todayStr();
    const daily = s.daily.date === day ? s.daily : { date: day, reviews: 0, lessons: 0 };
    const next = {
      ...s,
      currentLevel: cur,
      progress: { ...s.progress, [id]: np },
      daily: { ...daily, reviews: daily.reviews + (mode === "practice" ? 0 : 1) },
      history: { ...s.history, [day]: (s.history[day] || 0) + 1 },
    };
    persist(next);
    return leveled;
  }, [persist]);

  const startPractice = useCallback((itemsOrLeech) => {
    const items = itemsOrLeech === "leeches" ? (derived ? derived.leechList : []) : itemsOrLeech;
    if (items && items.length) { setPracticeItems(items); setView("practice"); }
  }, [derived]);

  const onTheme = useCallback((name) => {
    applyTheme(name);
    const s = stateRef.current;
    persist({ ...s, settings: { ...s.settings, theme: name } });
  }, [persist]);

  const onToggleCustom = useCallback((id) => {
    const s = stateRef.current;
    const cur = s.customItems || [];
    const next = cur.includes(id) ? cur.filter((x) => x !== id) : [...cur, id];
    persist({ ...s, customItems: next });
  }, [persist]);

  const onClearCustom = useCallback(() => {
    const s = stateRef.current;
    persist({ ...s, customItems: [] });
  }, [persist]);

  const onImport = useCallback((obj) => {
    if (!obj || typeof obj !== "object") return false;
    const next = {
      ...DEFAULT_STATE,
      ...obj,
      settings: { ...DEFAULT_STATE.settings, ...(obj.settings || {}) },
      script: { ...DEFAULT_STATE.script, ...(obj.script || {}) },
      progress: obj.progress || {},
      custom: obj.custom || [],
      customItems: obj.customItems || [],
      customLetters: obj.customLetters || [],
      history: obj.history || {},
    };
    applyTheme(next.settings.theme || "rose");
    persist(next);
    return true;
  }, [persist]);

  const onCustomLetters = useCallback((arr) => {
    const s = stateRef.current;
    persist({ ...s, customLetters: arr });
  }, [persist]);

  const startCustomItems = useCallback(() => {
    const s = stateRef.current;
    const ids = s.customItems || [];
    const all = [...ITEMS, ...(s.custom || [])];
    const items = all.filter((it) => ids.includes(it.id));
    if (items.length) { setPracticeItems(items); setView("practice"); }
  }, []);

  const dueLetters = useMemo(() => {
    if (!state) return 0;
    const sp = (state.script && state.script.progress) || {};
    const n = Date.now();
    return SCRIPT_FORMS.filter((t) => { const p = formProg(sp, t); return p && (p.due || 0) <= n; }).length;
  }, [state]);

  if (!state || !derived)
    return <div style={{ minHeight: "100vh", background: T.bg, color: T.textDim, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: uiFont }}>Loading…</div>;

  const dueWords = derived.due.filter((i) => i.type === "word");
  const duePhrases = derived.due.filter((i) => i.type === "phrase");
  const dueSentences = derived.due.filter((i) => i.type === "sentence");

  const tabs = [
    ["home", "Home"],
    ["lessons", "Lessons", derived.pool.length],
    ["reviews", "Reviews", derived.due.length + dueLetters],
    ["script", "Script"],
    ["items", "Items"],
    ["stats", "Stats"],
  ];

  return (
    <div style={{ minHeight: "100vh", background: `radial-gradient(1100px 560px at 50% -10%, ${T.bg2}, ${T.bg})`, color: T.text, fontFamily: uiFont, paddingBottom: 40 }}>
      <style>{`
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeUp { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }
        @keyframes pop { from { opacity:0; transform: scale(.97);} to {opacity:1; transform:none;} }
        @keyframes pulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; } 50% { transform: translate(-50%,-50%) scale(1.55); opacity:.45; } }
        .tap { transition: transform .12s ease, background .15s ease, border-color .15s ease; cursor: pointer; }
        .tap:active { transform: scale(.97); }
        .fade { animation: fadeUp .35s ease both; }
        .pop { animation: pop .25s ease both; }
        input, button, select { font-family: inherit; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: ${T.line}; border-radius: 8px; }
      `}</style>

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "22px 18px 10px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 38, height: 38, borderRadius: 11, background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: arFont, fontSize: 22, color: "#fff", fontWeight: 700, boxShadow: "0 4px 14px rgba(128,29,92,.22)" }}>ع</div>
          <div>
            <div style={{ fontFamily: displayFont, fontSize: 19 }}>Masri <span style={{ color: T.goldSoft }}>SRS</span></div>
            <div style={{ fontSize: 11.5, color: T.textDim, marginTop: -1 }}>Egyptian Arabic · level {state.currentLevel}</div>
          </div>
          <div style={{ marginLeft: "auto", textAlign: "right" }}>
            <div style={{ fontSize: 11, color: T.textDim }}>streak</div>
            <div style={{ fontSize: 16, color: T.gold, fontWeight: 700 }}>{streak}🔥</div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 3, marginTop: 16, background: T.panel, padding: 4, borderRadius: 13, border: `1px solid ${T.line}` }}>
          {tabs.map(([k, label, n]) => (
            <button key={k} className="tap" onClick={() => setView(k)} style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 1px", fontSize: 11, fontWeight: 600, position: "relative", color: view === k ? "#fff" : T.textDim, background: view === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent" }}>
              {label}
              {n > 0 && view !== k && (<span style={{ position: "absolute", top: 5, right: "50%", marginRight: -16, width: 6, height: 6, borderRadius: 999, background: T.terra }} />)}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 560, margin: "0 auto", padding: "8px 18px" }}>
        {view === "home" && (
          <HomeView
            state={state}
            level={state.currentLevel}
            levelPct={derived.levelPct}
            lessons={derived.pool.length}
            reviews={derived.due.length}
            leeches={derived.leechList.length}
            stageCounts={derived.stageCounts}
            streak={streak}
            onGo={setView}
            onTrouble={() => startPractice("leeches")}
            onSetting={(patch) => persist({ ...state, settings: { ...state.settings, ...patch } })}
            onTheme={onTheme}
            onImport={onImport}
            onReset={() => { persist({ ...DEFAULT_STATE, custom: state.custom, customItems: state.customItems, customLetters: state.customLetters, settings: state.settings, daily: { date: todayStr(), reviews: 0, lessons: 0 } }); setView("home"); }}
          />
        )}
        {view === "lessons" && (
          <LearnSession pool={derived.pool} batch={state.settings.lessonBatch} onLearn={commitLearn} onGrade={grade} onExit={() => setView("home")} />
        )}
        {view === "reviews" && (
          <ReviewsHub
            dueLetters={dueLetters}
            dueWords={dueWords}
            duePhrases={duePhrases}
            dueSentences={dueSentences}
            onLetters={() => { setScriptAuto(true); setView("script"); }}
            onVocab={(items) => { if (items.length) { setReviewRun(items); setView("reviewrun"); } }}
            onGotoItems={() => setView("items")}
            onGotoScript={() => { setScriptAuto(false); setView("script"); }}
          />
        )}
        {view === "reviewrun" && <TypedQuiz items={reviewRun} mode="srs" onGrade={grade} onExit={() => setView("reviews")} title="Reviews" />}
        {view === "practice" && <TypedQuiz items={practiceItems} mode="practice" onGrade={grade} onExit={() => setView("items")} title="Practice" />}
        {view === "script" && <ScriptView scriptState={state.script} setScript={(next) => persist({ ...state, script: next })} autoReview={scriptAuto} onAutoConsumed={() => setScriptAuto(false)} customLetters={state.customLetters || []} onCustomLetters={onCustomLetters} />}
        {view === "items" && (
          <ItemsView allItems={allItems} state={state} level={state.currentLevel} leeches={derived.leechList.length} onAdd={(c) => persist({ ...state, custom: [...state.custom, c] })} onStartPractice={startPractice} customItems={state.customItems || []} onToggleCustom={onToggleCustom} onStartCustom={startCustomItems} onClearCustom={onClearCustom} />
        )}
        {view === "stats" && <StatsView state={state} allItems={allItems} level={state.currentLevel} streak={streak} />}
      </div>
    </div>
  );
}

/* ===================== SCRIPT TRAIN (learn + SRS quiz the alphabet) ===================== */
function makeLetterQ(answer) {
  const pool = shuffle(ALPHABET.filter((x) => x[2] !== answer[2])).slice(0, 3);
  return { answer, options: shuffle([answer, ...pool]) };
}
function letterMatch(typed, glyph) {
  const strip = (s) => (s || "").replace(/[\u064B-\u0652\u0640\u0670]/g, "").trim();
  const alef = (c) => (/[إأآا]/.test(c) ? "ا" : c);
  const t = strip(typed);
  if (t === glyph) return true;
  if (t.length === 1 && alef(t) === alef(glyph)) return true;
  return false;
}
// normalize letter progress (migrate old {learned} shape to SRS shape)
function normLP(p) {
  if (!p) return null;
  if (typeof p.stage === "number") return p;
  if (p.learned) return { stage: 1, due: 0, correct: p.correct || 0, wrong: p.wrong || 0, recentWrong: p.recentWrong || 0, learnedAt: p.learnedAt || Date.now() };
  return null;
}

function ScriptTrain({ scriptState, setScript, autoReview, onAutoConsumed, customLetters, onCustomLetters }) {
  const cl = customLetters || [];
  const ss = scriptState || { progress: {}, best: 0, batch: 5 };
  const prog = ss.progress || {};
  const batch = ss.batch || 5;
  const quizDir = ss.quizDir || "recognize";
  const now = Date.now();

  const [mode, setMode] = useState("menu"); // menu | teach | quiz | done | select
  const [teachQueue, setTeachQueue] = useState([]);
  const [tIdx, setTIdx] = useState(0);
  const [quizSet, setQuizSet] = useState([]);
  const [initialSet, setInitialSet] = useState([]);
  const [initialLen, setInitialLen] = useState(0);
  const [quizSrs, setQuizSrs] = useState(false);
  const [step, setStep] = useState(0);
  const [sStreak, setSStreak] = useState({}); // shape key -> consecutive correct this session
  const [sMissed, setSMissed] = useState({}); // shape key -> ever missed this session
  const [q, setQ] = useState(null);
  const [picked, setPicked] = useState(null);
  const [typed, setTyped] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [traceShown, setTraceShown] = useState(false);
  const [traceKey, setTraceKey] = useState(0);
  const [sess, setSess] = useState({ right: 0, total: 0, streak: 0, best: ss.best || 0 });
  const timer = useRef(null);
  useEffect(() => () => clearTimeout(timer.current), []);
  const didAuto = useRef(false);
  useEffect(() => {
    if (autoReview && !didAuto.current) {
      didAuto.current = true;
      if (dueArr.length) startQuiz(dueArr, true);
      if (onAutoConsumed) onAutoConsumed();
    }
    // eslint-disable-next-line
  }, [autoReview]);

  const fpOf = (t) => formProg(prog, t);
  const learnedForms = SCRIPT_FORMS.filter(fpOf);
  const dueArr = SCRIPT_FORMS.filter((t) => { const p = fpOf(t); return p && (p.due || 0) <= now; });
  const trouble = SCRIPT_FORMS.filter((t) => (fpOf(t)?.recentWrong || 0) >= 2);
  const mastered = SCRIPT_FORMS.filter((t) => (fpOf(t)?.stage || 0) >= 5);
  const unlearnedLetters = ALPHABET.filter((a) => !letterLearnedIn(prog, a[0]));
  const formsOfLetters = (rows) => SCRIPT_FORMS.filter((t) => rows.some((r) => r[0] === t[0]));
  const overallPct = SCRIPT_FORMS.length ? Math.round(SCRIPT_FORMS.reduce((s, t) => s + masteryPct(fpOf(t)), 0) / SCRIPT_FORMS.length) : 0;

  const saveProg = (key, np, newStreak) => {
    setScript({ ...ss, progress: { ...prog, [key]: np }, best: Math.max(ss.best || 0, newStreak || 0) });
  };
  const markLearnedLetter = (glyph) => {
    const add = {}; const t = Date.now();
    for (const f of distinctForms(glyph)) { const k = glyph + ":" + f; if (!prog[k]) add[k] = learnItem(t); }
    if (Object.keys(add).length) setScript({ ...ss, progress: { ...prog, ...add } });
  };
  const setBatch = (n) => setScript({ ...ss, batch: n });
  const setDir = (d) => setScript({ ...ss, quizDir: d });

  // Grade a shape into the SRS exactly once (at graduation), reflecting whether it
  // was ever missed this session — so a stumble still applies the 50% setback.
  const gradeSRS = (tok, ok) => {
    const cur = fpOf(tok) || learnItem(Date.now());
    const np = quizSrs
      ? reviewSchedule(cur, ok, Date.now())
      : { ...cur, correct: cur.correct + (ok ? 1 : 0), wrong: cur.wrong + (ok ? 0 : 1), recentWrong: ok ? 0 : (cur.recentWrong || 0) + 1 };
    saveProg(tok[5], np, sess.best);
  };

  const startLearn = () => {
    const next = unlearnedLetters.slice(0, batch);
    if (!next.length) return;
    setTeachQueue(next);
    setTIdx(0);
    setMode("teach");
  };
  const startQuiz = (list, srs) => {
    if (!list.length) return;
    const set = shuffle(list).slice(0, 15);
    setQuizSet(set);
    setInitialSet(set);
    setInitialLen(set.length);
    setQuizSrs(!!srs);
    setSStreak({});
    setSMissed({});
    setStep(0);
    setPicked(null);
    setTyped("");
    setFeedback(null);
    setTraceShown(false);
    setTraceKey((k) => k + 1);
    setQ(makeLetterQ(set[0]));
    setSess({ right: 0, total: 0, streak: 0, best: ss.best || 0 });
    setMode("quiz");
  };
  const retakeQuiz = () => { if (initialSet.length) startQuiz(initialSet, quizSrs); };

  // The drill-to-mastery step: a shape leaves the session only after TWO correct in a
  // row; otherwise it rotates to the back to be retaken. The session ends only when
  // every shape has been cleared.
  const transition = (tok, ok) => {
    clearTimeout(timer.current);
    const key = tok[5];
    const newStreak = ok ? (sStreak[key] || 0) + 1 : 0;
    const wasMissed = sMissed[key] || !ok;
    setSess((s) => { const ns = ok ? s.streak + 1 : 0; return { right: s.right + (ok ? 1 : 0), total: s.total + 1, streak: ns, best: Math.max(s.best, ns) }; });
    setSStreak((m) => ({ ...m, [key]: newStreak }));
    if (!ok) setSMissed((m) => ({ ...m, [key]: true }));
    let nq;
    if (newStreak >= 2) { gradeSRS(tok, !wasMissed); nq = quizSet.slice(1); }
    else { nq = [...quizSet.slice(1), tok]; }
    setPicked(null); setTyped(""); setFeedback(null); setTraceShown(false); setTraceKey((k) => k + 1); setStep((s) => s + 1);
    if (nq.length === 0) { setMode("done"); return; }
    setQuizSet(nq); setQ(makeLetterQ(nq[0]));
  };

  const choose = (opt) => {
    if (picked) return;
    const ans = q.answer;
    const ok = opt[2] === ans[2];
    speak(ans[0]);
    setPicked(opt);
    timer.current = setTimeout(() => transition(ans, ok), 950);
  };
  const checkType = () => {
    const ans = q.answer;
    if (feedback) { transition(ans, feedback === "correct"); return; }
    const ok = letterMatch(typed, ans[0]);
    speak(ans[0]);
    setFeedback(ok ? "correct" : "wrong");
  };
  const giveUpType = () => {
    if (feedback) return;
    speak(q.answer[0]);
    setFeedback("wrong");
  };
  const flipDir = () => { clearTimeout(timer.current); const order = ["recognize", "type", "trace"]; setDir(order[(order.indexOf(quizDir) + 1) % 3]); setPicked(null); setTyped(""); setFeedback(null); setTraceShown(false); setTraceKey((k) => k + 1); };

  // Tracing quiz: write from memory, reveal, then self-grade — same mastery loop.
  const gradeTrace = (ok) => { transition(q.answer, ok); };

  /* ===================== MENU ===================== */
  if (mode === "menu") {
    return (
      <div className="fade" style={{ paddingTop: 4 }}>
        <div style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 20, padding: "18px 18px 16px", marginBottom: 14, boxShadow: "0 12px 30px rgba(128,29,92,.08)" }}>
          <div style={{ fontFamily: displayFont, fontSize: 21, color: T.gold }}>Master the alphabet</div>
          <div style={{ fontSize: 12.5, color: T.textDim, marginTop: 3, lineHeight: 1.5 }}>
            Learn {batch} letters, quiz them, and they come back on a spaced schedule — just like the words.
          </div>
          <div style={{ fontSize: 12.5, color: T.textDim, marginTop: 3, lineHeight: 1.5 }}>
            Learn each letter, then quiz <b style={{ color: T.text }}>every shape</b> — isolated, initial, medial, final — on a spaced schedule, just like the words.
          </div>
          <div style={{ margin: "14px 0 6px" }}><Bar pct={learnedForms.length / SCRIPT_FORMS.length} /></div>
          <div style={{ fontSize: 12, color: T.textDim }}>{learnedForms.length} / {SCRIPT_FORMS.length} shapes learned · {mastered.length} mastered · {overallPct}% overall mastery</div>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat label="Mastery" value={`${overallPct}%`} color={T.gold} />
          <Stat label="Shapes learned" value={learnedForms.length} color={T.terra} />
          <Stat label="Trouble" value={trouble.length} color={trouble.length ? T.red : T.textDim} />
        </div>

        {/* SRS due reviews — primary */}
        <button className="tap" onClick={() => startQuiz(dueArr, true)} disabled={!dueArr.length} style={{ width: "100%", padding: 15, borderRadius: 14, marginBottom: 10, background: dueArr.length ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel, color: dueArr.length ? "#fff" : T.textDim, fontSize: 15, fontWeight: 700, boxShadow: dueArr.length ? "0 8px 20px rgba(128,29,92,.18)" : "none", border: dueArr.length ? "none" : `1px solid ${T.line}` }}>
          {dueArr.length ? `Review due shapes (${dueArr.length}) →` : "No shapes due for review"}
        </button>

        <button className="tap" onClick={startLearn} disabled={!unlearnedLetters.length} style={{ width: "100%", padding: 14, borderRadius: 13, marginBottom: 10, border: `1px solid ${unlearnedLetters.length ? T.gold : T.line}`, background: unlearnedLetters.length ? `${T.gold}10` : T.panel, color: unlearnedLetters.length ? T.gold : T.textDim, fontSize: 14, fontWeight: 700 }}>
          {unlearnedLetters.length ? `Learn next ${Math.min(batch, unlearnedLetters.length)} letters` : "All 28 letters learned 🎉"}
        </button>

        <button className="tap" onClick={() => setMode("select")} style={{ width: "100%", padding: 13, borderRadius: 13, marginBottom: 10, border: `1px solid ${T.line}`, background: T.panel, color: T.text, fontSize: 14, fontWeight: 700 }}>
          ★ Custom letter quiz {cl.length ? `(${cl.length})` : ""}
        </button>

        <button className="tap" onClick={() => startQuiz(learnedForms, false)} disabled={!learnedForms.length} style={{ width: "100%", padding: 13, borderRadius: 13, marginBottom: 10, border: `1px solid ${learnedForms.length ? T.line : T.line}`, background: T.panel, color: learnedForms.length ? T.text : T.textDim, fontSize: 14, fontWeight: 700 }}>
          ✨ Quiz all learned shapes
        </button>

        <button className="tap" onClick={() => startQuiz(trouble, false)} disabled={!trouble.length} style={{ width: "100%", padding: 13, borderRadius: 13, border: `1px solid ${trouble.length ? T.red : T.line}`, background: trouble.length ? `${T.red}0f` : T.panel, color: trouble.length ? T.red : T.textDim, fontSize: 14, fontWeight: 700 }}>
          🔁 Drill trouble shapes {trouble.length ? `(${trouble.length})` : ""}
        </button>

        {/* settings */}
        <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16, padding: 16, marginTop: 16 }}>
          <div style={{ fontSize: 12.5, color: T.textDim, marginBottom: 10 }}>Quiz style</div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {[["recognize", "👀 Letter → sound"], ["type", "⌨️ Sound → type"], ["trace", "✍️ Sound → write"]].map(([k, label]) => (
              <button key={k} className="tap" onClick={() => setDir(k)} style={{ flex: "1 1 30%", border: "none", borderRadius: 10, padding: "10px 6px", fontSize: 11, fontWeight: 600, color: quizDir === k ? "#fff" : T.textDim, background: quizDir === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panelHi }}>{label}</button>
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14 }}>Letters per learning batch</span>
            <div style={{ display: "flex", gap: 8 }}>
              {[3, 5, 7, 10].map((n) => (
                <button key={n} className="tap" onClick={() => setBatch(n)} style={{ border: `1px solid ${batch === n ? T.gold : T.line}`, background: batch === n ? `${T.gold}18` : "transparent", color: batch === n ? T.gold : T.textDim, borderRadius: 9, padding: "6px 11px", fontSize: 13, fontWeight: 600 }}>{n}</button>
              ))}
            </div>
          </div>
        </div>

        {trouble.length > 0 && (
          <div style={{ marginTop: 14, display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center" }}>
            {trouble.map((a) => (<span key={a[5]} title={a[1] + " · " + a[6]} style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", color: T.red, border: `1px solid ${T.red}44`, borderRadius: 9, padding: "3px 10px", direction: "rtl" }}><span style={{ fontFamily: arFont, fontSize: 24 }}>{a[4]}</span><span style={{ fontFamily: uiFont, fontSize: 8, direction: "ltr", color: T.red, opacity: 0.8 }}>{a[6]}</span></span>))}
          </div>
        )}
      </div>
    );
  }

  /* ===================== SELECT LETTERS ===================== */
  if (mode === "select") {
    const isOn = (g) => cl.includes(g);
    const selList = ALPHABET.filter((a) => isOn(a[0]));
    const toggle = (g) => onCustomLetters(isOn(g) ? cl.filter((x) => x !== g) : [...cl, g]);
    return (
      <div className="fade">
        <div style={{ fontFamily: displayFont, fontSize: 19, marginBottom: 4 }}>Custom letter quiz</div>
        <div style={{ fontSize: 12.5, color: T.textDim, marginBottom: 12 }}>Tap any letter to add it — your picks are saved for next time.</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <button className="tap" onClick={() => onCustomLetters(ALPHABET.filter((a) => letterLearnedIn(prog, a[0])).map((a) => a[0]))} style={{ flex: 1, padding: 10, borderRadius: 11, border: `1px solid ${T.line}`, background: T.panel, color: T.text, fontSize: 12.5, fontWeight: 600 }}>Add all learned</button>
          <button className="tap" onClick={() => onCustomLetters([])} style={{ flex: 1, padding: 10, borderRadius: 11, border: `1px solid ${T.line}`, background: T.panel, color: T.textDim, fontSize: 12.5, fontWeight: 600 }}>Clear</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, paddingBottom: 80 }}>
          {ALPHABET.map((a) => {
            const on = isOn(a[0]);
            const seen = letterLearnedIn(prog, a[0]);
            return (
              <button key={a[0]} className="tap" onClick={() => toggle(a[0])} style={{ position: "relative", border: `1.5px solid ${on ? T.gold : T.line}`, background: on ? `${T.gold}14` : T.panel, borderRadius: 12, padding: "10px 4px", cursor: "pointer", textAlign: "center" }}>
                <div style={{ fontFamily: arFont, fontSize: 30, color: seen ? T.text : T.textDim, direction: "rtl", lineHeight: 1 }}>{a[0]}</div>
                <div style={{ fontSize: 10, color: on ? T.gold : T.textDim, marginTop: 3 }}>{a[2]}</div>
                {on && <div style={{ position: "absolute", top: 4, right: 6, fontSize: 11, color: T.gold }}>★</div>}
              </button>
            );
          })}
        </div>
        <div style={{ position: "fixed", left: 0, right: 0, bottom: 0, padding: "12px 18px calc(12px + env(safe-area-inset-bottom))", background: `linear-gradient(180deg, transparent, ${T.bg} 30%)` }}>
          <div style={{ maxWidth: 560, margin: "0 auto", display: "flex", gap: 8 }}>
            <button className="tap" onClick={() => setMode("menu")} style={{ padding: "13px 16px", borderRadius: 13, border: `1px solid ${T.line}`, background: T.panel, color: T.textDim, fontWeight: 600, fontSize: 13 }}>Back</button>
            <button className="tap" onClick={() => startQuiz(formsOfLetters(selList), false)} disabled={!selList.length} style={{ flex: 1, padding: "13px 16px", borderRadius: 13, border: "none", background: selList.length ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.line, color: selList.length ? "#fff" : T.textDim, fontWeight: 700, fontSize: 14 }}>★ Start quiz ({selList.length})</button>
          </div>
        </div>
      </div>
    );
  }

  /* ===================== TEACH ===================== */
  if (mode === "teach") {
    const a = teachQueue[tIdx];
    const f = letterForms(a[0]);
    const sk = STROKES[a[0]];
    return (
      <div className="fade">
        <div style={{ height: 4, background: T.line, borderRadius: 4, overflow: "hidden", marginBottom: 14 }}>
          <div style={{ height: "100%", width: `${(tIdx / teachQueue.length) * 100}%`, background: `linear-gradient(90deg, ${T.gold}, ${T.terra})` }} />
        </div>
        <div className="pop" key={a[0]} style={{ background: `linear-gradient(160deg, ${T.panelHi}, ${T.panel})`, border: `1px solid ${T.line}`, borderRadius: 22, padding: "26px 22px", textAlign: "center", boxShadow: "0 12px 34px rgba(128,29,92,.10)" }}>
          <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft }}>New letter</div>
          <div style={{ fontFamily: arFont, fontSize: 88, color: T.text, direction: "rtl", lineHeight: 1.1, margin: "6px 0 4px" }}>{a[0]}</div>
          <div style={{ fontSize: 17, color: T.text }}>{a[1]} <span style={{ color: T.goldSoft, fontStyle: "italic" }}>· {a[2]}</span></div>
          <div style={{ fontSize: 13, color: T.textDim, marginTop: 4, lineHeight: 1.5 }}>{a[3]}</div>
          {sk && <div style={{ fontSize: 12.5, color: T.gold, marginTop: 6, lineHeight: 1.5 }}>✍️ {sk[1]}</div>}
          <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
            {[["iso", f.iso], ["init", f.ini], ["med", f.med], ["fin", f.fin]].map(([k, glyph]) => (
              <div key={k} style={{ flex: 1, textAlign: "center", background: T.panel, border: `1px solid ${T.line}`, borderRadius: 9, padding: "8px 2px" }}>
                <div style={{ fontFamily: arFont, fontSize: 26, color: T.text, direction: "rtl", minHeight: 32 }}>{glyph}</div>
                <div style={{ fontSize: 9, color: T.textDim, marginTop: 3, textTransform: "uppercase", letterSpacing: 0.5 }}>{k}</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 14 }}><Speaker text={a[0]} size={20} color={T.gold} /></div>
          <div style={{ marginTop: 16, borderTop: `1px dashed ${T.line}`, paddingTop: 14 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: T.goldSoft, marginBottom: 8 }}>✍️ Now write it</div>
            <MiniTrace glyph={a[0]} guide={true} resetKey={tIdx} />
            <div style={{ fontSize: 11.5, color: T.textDim, marginTop: 8, lineHeight: 1.5 }}>Trace over the gray letter, right → left. Dots and hamzas go on last.</div>
          </div>
        </div>
        <button className="tap" onClick={() => { markLearnedLetter(a[0]); if (tIdx + 1 >= teachQueue.length) startQuiz(formsOfLetters([...teachQueue, a]), true); else setTIdx(tIdx + 1); }} style={{ width: "100%", marginTop: 14, padding: 15, borderRadius: 14, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontSize: 15, fontWeight: 700 }}>
          {tIdx + 1 >= teachQueue.length ? "Got them — quiz me →" : "Learn it ✓"}
        </button>
        <div style={{ textAlign: "center", fontSize: 12, color: T.textDim, marginTop: 10 }}>Learning {tIdx + 1} of {teachQueue.length}</div>
      </div>
    );
  }

  /* ===================== DONE ===================== */
  if (mode === "done") {
    return (
      <div className="fade pop" style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 20, padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 8 }}>🎉</div>
        <div style={{ fontFamily: displayFont, fontSize: 22 }}>All shapes mastered!</div>
        <div style={{ color: T.textDim, fontSize: 14, marginTop: 8, lineHeight: 1.5 }}>You got every shape right twice in a row — {initialLen} shape{initialLen === 1 ? "" : "s"} cleared.</div>
        {quizSrs && <div style={{ fontSize: 12, color: T.goldSoft, marginTop: 6 }}>Scheduled for their next review.</div>}
        <button className="tap" onClick={retakeQuiz} style={{ width: "100%", marginTop: 18, padding: 13, borderRadius: 13, border: `1px solid ${T.gold}`, background: `${T.gold}10`, color: T.gold, fontWeight: 700 }}>🔁 Retake this set</button>
        <button className="tap" onClick={() => setMode("menu")} style={{ width: "100%", marginTop: 10, padding: 14, borderRadius: 13, border: "none", background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`, color: "#fff", fontWeight: 700 }}>Back</button>
      </div>
    );
  }

  /* ===================== QUIZ ===================== */
  const ans = q.answer;
  const isType = quizDir === "type";
  const isTrace = quizDir === "trace";
  const correct = feedback === "correct";
  const wrong = feedback === "wrong";
  const dirLabel = isTrace ? "Sound → write letter" : isType ? "Sound → type letter" : "Letter → pick sound";
  const masteredShapes = initialLen - quizSet.length;
  const curStreak = sStreak[ans[5]] || 0;
  const typeWillFinish = feedback === "correct" && curStreak + 1 >= 2 && quizSet.length === 1;

  return (
    <div className="fade">
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <Stat label="Mastered" value={`${masteredShapes}/${initialLen}`} color={T.gold} />
        <Stat label="Streak" value={`${sess.streak}🔥`} color={T.terra} />
        <Stat label="This shape" value={curStreak >= 1 ? `${curStreak}/2 ✓` : "0/2"} color={curStreak >= 1 ? T.green : T.textDim} />
      </div>

      <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
        <button className="tap" onClick={flipDir} style={{ border: `1px solid ${T.line}`, background: T.panelHi, color: T.gold, borderRadius: 20, padding: "7px 14px", fontSize: 12, fontWeight: 600 }}>
          {dirLabel} ⇄
        </button>
      </div>

      {isTrace ? (
        <>

/* ---- shuffle helper ---- */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeQuestion(qmode) {
  const answer = ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
  const pool = shuffle(ALPHABET.filter((x) => x[2] !== answer[2])).slice(0, 3);
  const options = shuffle([answer, ...pool]);
  const forms = distinctForms(answer[0]);
  const fcode = forms[Math.floor(Math.random() * forms.length)];
  return { answer, options, qmode, shape: letterForms(answer[0])[fcode], formLabel: FORM_LABEL[fcode] };
}
