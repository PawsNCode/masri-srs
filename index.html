/* Compact, reusable trace pad — ghost glyph + grid + a drawable canvas.
   Used in the learning step (guide on) and the tracing quiz (guide off until reveal).
   Pass a changing `resetKey` to wipe the canvas (e.g. on the next quiz letter). */
function MiniTrace({ glyph, guide = true, resetKey = 0 }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef(null);

  const setup = useCallback(() => {
    const c = canvasRef.current;
    if (!c) return;
    const rect = c.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = rect.width * dpr;
    c.height = rect.height * dpr;
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = 10;
    ctx.strokeStyle = T.gold;
  }, []);

  const clear = useCallback(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
  }, []);

  useEffect(() => {
    setup();
    const onR = () => setup();
    window.addEventListener("resize", onR);
    return () => window.removeEventListener("resize", onR);
  }, [setup]);

  // wipe when the letter or the reset signal changes
  useEffect(() => { setup(); clear(); }, [glyph, resetKey, setup, clear]);

  const pos = (e) => {
    const c = canvasRef.current;
    const rect = c.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  };
  const start = (e) => { e.preventDefault(); drawing.current = true; last.current = pos(e); };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last.current = p;
  };
  const end = () => { drawing.current = false; };

  return (
    <div style={{ position: "relative", width: "100%", aspectRatio: "1 / 1", background: T.panel, border: `1px solid ${T.line}`, borderRadius: 18, overflow: "hidden", boxShadow: "0 10px 28px rgba(128,29,92,.08)" }}>
      <GuideOverlay glyph={glyph} show={guide} />
      <canvas
        ref={canvasRef}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}
        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", touchAction: "none", cursor: "crosshair" }}
      />
      <button className="tap" onClick={clear} style={{ position: "absolute", bottom: 8, right: 8, border: `1px solid ${T.line}`, background: T.panelHi, color: T.textDim, borderRadius: 9, padding: "5px 11px", fontSize: 11.5, fontWeight: 600 }}>Clear</button>
    </div>
  );
}

function ScriptTrace({ initialIdx, onBack }) {
  const [tmode, setTmode] = useState("practice"); // practice | quiz
  const [idx, setIdx] = useState(initialIdx || 0);
  const [showGuide, setShowGuide] = useState(true);
  const [qIdx, setQIdx] = useState(() => Math.floor(Math.random() * ALPHABET.length));
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ right: 0, total: 0, streak: 0, best: 0 });
  const canvasRef = React.useRef(null);
  const drawing = React.useRef(false);
  const last = React.useRef(null);
  const [, setStrokes] = useState(0);

  const isQuiz = tmode === "quiz";
  const activeIdx = isQuiz ? qIdx : idx;
  const letter = ALPHABET[activeIdx];
  const sk = STROKES[letter[0]];
  const guideOn = isQuiz ? revealed : showGuide;
  const showDetails = !isQuiz || revealed; // when to reveal name-shape details

  const setup = useCallback(() => {
    const c = canvasRef.current;
    if (!c) return;
    const rect = c.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = rect.width * dpr;
    c.height = rect.height * dpr;
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = 11;
    ctx.strokeStyle = "#801d5c";
  }, []);

  useEffect(() => {
    setup();
    const onResize = () => setup();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [setup]);

  const clear = useCallback(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    setStrokes(0);
  }, []);

  // clear whenever the active letter or mode changes
  useEffect(() => {
    clear();
  }, [activeIdx, tmode, clear]);

  const pos = (e) => {
    const c = canvasRef.current;
    const rect = c.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  };
  const start = (e) => {
    e.preventDefault();
    drawing.current = true;
    last.current = pos(e);
    setStrokes((s) => s + 1);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const c = canvasRef.current;
    const ctx = c.getContext("2d");
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last.current = p;
  };
  const end = () => {
    drawing.current = false;
  };

  const nextQuiz = () => {
    setRevealed(false);
    clear();
    setQIdx((prev) => {
      let n;
      do {
        n = Math.floor(Math.random() * ALPHABET.length);
      } while (n === prev && ALPHABET.length > 1);
      return n;
    });
  };
  const grade = (ok) => {
    setScore((s) => {
      const streak = ok ? s.streak + 1 : 0;
      return {
        right: s.right + (ok ? 1 : 0),
        total: s.total + 1,
        streak,
        best: Math.max(s.best, streak),
      };
    });
    nextQuiz();
  };
  const switchMode = (m) => {
    if (m === tmode) return;
    setTmode(m);
    setRevealed(false);
    clear();
    if (m === "quiz") setQIdx(Math.floor(Math.random() * ALPHABET.length));
  };

  const acc = score.total ? Math.round((score.right / score.total) * 100) : 0;

  return (
    <div className="fade">
      {onBack && (
        <button className="tap" onClick={onBack} style={{ display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 12, padding: "8px 14px", borderRadius: 999, border: `1px solid ${T.line}`, background: T.panel, color: T.gold, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          ‹ Back to chart
        </button>
      )}
      {/* practice / quiz toggle */}
      <div
        style={{
          display: "flex",
          gap: 6,
          background: T.panelHi,
          border: `1px solid ${T.line}`,
          padding: 5,
          borderRadius: 12,
          marginBottom: 14,
        }}
      >
        {[
          ["practice", "Practice"],
          ["quiz", "Quiz"],
        ].map(([k, label]) => (
          <button
            key={k}
            className="tap"
            onClick={() => switchMode(k)}
            style={{
              flex: 1,
              border: "none",
              borderRadius: 8,
              padding: "8px 4px",
              fontSize: 12.5,
              fontWeight: 600,
              color: tmode === k ? "#ffffff" : T.textDim,
              background: tmode === k ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : "transparent",
            }}
          >
            {label}
          </button>
        ))}
      </div>

      {/* golden rules primer */}
      <div
        style={{
          background: T.panelHi,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: "12px 14px",
          marginBottom: 14,
          fontSize: 12.5,
          lineHeight: 1.7,
        }}
      >
        <b style={{ color: T.gold }}>Golden rules of Arabic handwriting</b>
        <div style={{ color: T.textDim, marginTop: 5 }}>
          1. Always write right → left.
          <br />
          2. Tall vertical strokes go top → bottom.
          <br />
          3. Bowl &amp; toothed letters start from the right and sweep left.
          <br />
          4. Add all dots and hamzas <b style={{ color: T.text }}>last</b>, once the body is done.
        </div>
      </div>

      {/* quiz scoreboard */}
      {isQuiz && (
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat label="Score" value={`${score.right}/${score.total}`} color={T.gold} />
          <Stat label="Accuracy" value={`${acc}%`} color={T.terra} />
          <Stat label="Streak" value={`${score.streak}🔥`} color={T.amber} />
          <Stat label="Best" value={score.best} color={T.green} />
        </div>
      )}

      {/* info / prompt card */}
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 12,
          background: T.panel,
          border: `1px solid ${T.line}`,
          borderRadius: 14,
          padding: "12px 14px",
          marginBottom: 14,
        }}
      >
        <div style={{ flex: 1 }}>
          {isQuiz && !revealed && (
            <div style={{ fontSize: 11, color: T.terra, fontWeight: 700, letterSpacing: 0.4, marginBottom: 3 }}>
              WRITE THIS LETTER FROM MEMORY
            </div>
          )}
          <div style={{ fontSize: 16, color: T.text, fontWeight: 600 }}>
            {letter[1]}{" "}
            <span style={{ color: T.goldSoft, fontStyle: "italic", fontWeight: 400 }}>
              · {letter[2]}
            </span>
          </div>
          {showDetails && (
            <>
              <div style={{ fontSize: 12, color: T.textDim, marginTop: 2 }}>{letter[3]}</div>
              {sk && (
                <div style={{ fontSize: 12.5, color: T.gold, marginTop: 5, lineHeight: 1.5 }}>
                  ✍️ {sk[1]}
                </div>
              )}
            </>
          )}
        </div>
        <Speaker text={letter[0]} color={T.terra} />
        {!isQuiz && (
          <div style={{ fontSize: 12, color: T.textDim }}>
            {idx + 1}/{ALPHABET.length}
          </div>
        )}
      </div>

      {/* canvas + guide */}
      <div
        style={{
          position: "relative",
          width: "100%",
          aspectRatio: "1 / 1",
          background: T.panel,
          border: `1px solid ${T.line}`,
          borderRadius: 20,
          overflow: "hidden",
          boxShadow: "0 14px 36px rgba(128,29,92,.10)",
        }}
      >
        {/* letter ghost + 2×2 grid + numbered stroke-order guide (anchored to the glyph) */}
        <GuideOverlay glyph={letter[0]} show={guideOn} />
        <canvas
          ref={canvasRef}
          onMouseDown={start}
          onMouseMove={move}
          onMouseUp={end}
          onMouseLeave={end}
          onTouchStart={start}
          onTouchMove={move}
          onTouchEnd={end}
          style={{ position: "absolute", inset: 0, width: "100%", height: "100%", touchAction: "none", cursor: "crosshair" }}
        />
      </div>

      {/* controls */}
      {!isQuiz ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button
            className="tap"
            onClick={() => setIdx((i) => (i - 1 + ALPHABET.length) % ALPHABET.length)}
            style={ctrlBtn(false)}
          >
            ‹ Prev
          </button>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>
            Clear
          </button>
          <button className="tap" onClick={() => setShowGuide((g) => !g)} style={ctrlBtn(showGuide)}>
            {showGuide ? "Hide guide" : "Show guide"}
          </button>
          <button
            className="tap"
            onClick={() => setIdx((i) => (i + 1) % ALPHABET.length)}
            style={ctrlBtn(true)}
          >
            Next ›
          </button>
        </div>
      ) : !revealed ? (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button className="tap" onClick={clear} style={ctrlBtn(false)}>
            Clear
          </button>
          <button className="tap" onClick={nextQuiz} style={ctrlBtn(false)}>
            Skip
          </button>
          <button className="tap" onClick={() => setRevealed(true)} style={{ ...ctrlBtn(true), flex: 2 }}>
            Reveal answer
          </button>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
          <button
            className="tap"
            onClick={() => grade(false)}
            style={{
              flex: 1,
              padding: "12px 4px",
              borderRadius: 12,
              fontSize: 13,
              fontWeight: 700,
              cursor: "pointer",
              border: `1.5px solid ${T.red}`,
              background: `${T.red}14`,
              color: T.text,
            }}
          >
            Practice again
          </button>
          <button
            className="tap"
            onClick={() => grade(true)}
            style={{
              flex: 1,
              padding: "12px 4px",
              borderRadius: 12,
              fontSize: 13,
              fontWeight: 700,
              cursor: "pointer",
              border: "none",
              background: `linear-gradient(135deg, ${T.gold}, ${T.terra})`,
              color: "#ffffff",
            }}
          >
            Got it ✓
          </button>
        </div>
      )}

      <div style={{ fontSize: 11.5, color: T.textDim, textAlign: "center", marginTop: 16, lineHeight: 1.6 }}>
        {!isQuiz ? (
          <>
            Read the ✍️ stroke steps above and trace over the gray letter. Arabic flows <b style={{ color: T.text }}>right → left</b>, and dots are added last. Tap “Hide guide” to test yourself from memory.
          </>
        ) : !revealed ? (
          <>
            Picture the letter, write it from memory, then tap <b style={{ color: T.text }}>Reveal answer</b> to check
            the shape and dots. Tap 🔊 to hear it.
          </>
        ) : (
          <>
            Compare your writing to the guide. Be honest — did you get the <b style={{ color: T.text }}>shape and dots</b>{" "}
            right?
          </>
        )}
      </div>
    </div>
  );
}

function ctrlBtn(active) {
  return {
    flex: 1,
    padding: "11px 4px",
    borderRadius: 12,
    fontSize: 12.5,
    fontWeight: 600,
    cursor: "pointer",
    border: active ? "none" : `1px solid ${T.line}`,
    background: active ? `linear-gradient(135deg, ${T.gold}, ${T.terra})` : T.panel,
    color: active ? "#ffffff" : T.text,
  };
}

function ScriptLearn({ onTrace, prog = {} }) {
  return (
    <div className="fade" style={{ paddingTop: 6 }}>
      <div style={{ fontFamily: displayFont, fontSize: 20, marginBottom: 6 }}>
        Read &amp; write the script
      </div>
      <p style={{ fontSize: 13.5, color: T.textDim, lineHeight: 1.7, marginTop: 0 }}>
        Arabic is written right-to-left. There are 28 letters, and most change
        shape depending on where they sit in a word. Short vowels usually aren't
        written — you learn them from the word itself.
      </p>

      <div style={{ fontFamily: displayFont, fontSize: 16, margin: "18px 0 10px", color: T.gold }}>
        Pronunciation key
      </div>
      <p style={{ fontSize: 12.5, color: T.textDim, lineHeight: 1.6, marginTop: -4 }}>
        The italic spelling under each card (e.g. <i>ezzaay</i>) uses these symbols:
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
        {LEGEND.map(([sym, desc]) => (
          <div
            key={sym}
            style={{
              display: "flex",
              gap: 12,
              alignItems: "center",
              background: T.panel,
              border: `1px solid ${T.line}`,
              borderRadius: 11,
              padding: "9px 13px",
            }}
          >
            <span style={{ color: T.gold, fontWeight: 700, fontSize: 15, minWidth: 64 }}>
              {sym}
            </span>
            <span style={{ fontSize: 12.5, color: T.text, lineHeight: 1.5 }}>{desc}</span>
          </div>
        ))}
      </div>

      <div style={{ fontFamily: displayFont, fontSize: 16, margin: "24px 0 4px", color: T.gold }}>
        The alphabet
      </div>
      <div style={{ fontSize: 12, color: T.textDim, marginBottom: 10, lineHeight: 1.6 }}>
        Each row shows the four shapes a letter takes:{" "}
        <b style={{ color: T.text }}>isolated · initial · medial · final</b>. The % and
        colored bar under each shape is <b style={{ color: T.gold }}>your mastery of that
        exact shape</b> — so you can see which shapes still need work. Tap the big letter to{" "}
        <b style={{ color: T.gold }}>trace</b> it, or 🔊 to hear it.
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: "4px 12px", margin: "0 2px 12px", fontSize: 11 }}>
        {[[T.green, "solid"], [T.amber, "improving"], [T.red, "needs work"], [T.line, "not started"]].map(([c, label]) => (
          <span key={label} style={{ display: "inline-flex", alignItems: "center", gap: 5, color: T.textDim }}>
            <span style={{ width: 9, height: 9, borderRadius: 3, background: c }} />{label}
          </span>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
        {ALPHABET.map(([l, name, tr, note], idx) => {
          const f = letterForms(l);
          const cellInfo = (code) => {
            const ef = effForm(l, code);
            const p = normLP(prog[l + ":" + ef]) || normLP(prog[l]) || null;
            return { glyph: letterForms(l)[ef], color: masteryColor(p), pct: p ? masteryPct(p) : null };
          };
          const dist = distinctForms(l);
          const letterPct = Math.round(dist.reduce((s, ff) => s + masteryPct(normLP(prog[l + ":" + ff]) || normLP(prog[l])), 0) / dist.length);
          const letterColor = (() => {
            const ps = dist.map((ff) => normLP(prog[l + ":" + ff]) || normLP(prog[l]));
            if (ps.some((p) => !p)) return null;
            if (ps.some((p) => (p.recentWrong || 0) >= 2)) return T.red;
            if (ps.every((p) => (p.wrong || 0) === 0)) return T.green;
            return T.amber;
          })();
          return (
            <div
              key={name}
              style={{
                background: T.panel,
                border: `1px solid ${T.line}`,
                borderRadius: 14,
                padding: "12px 14px",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button
                  className="tap"
                  onClick={() => onTrace && onTrace(idx)}
                  aria-label={"Trace " + name}
                  title="Tap to trace"
                  style={{
                    fontFamily: arFont,
                    fontSize: 40,
                    color: T.text,
                    minWidth: 56,
                    textAlign: "center",
                    direction: "rtl",
                    cursor: "pointer",
                    border: `1px solid ${T.line}`,
                    background: T.panelHi,
                    borderRadius: 12,
                    padding: "4px 6px 2px",
                    lineHeight: 1,
                  }}
                >
                  {l}
                  <span style={{ display: "block", fontFamily: uiFont, fontSize: 8.5, color: T.gold, fontWeight: 700, marginTop: 2 }}>✍️ trace</span>
                </button>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14.5, color: T.text }}>
                    {name}{" "}
                    <span style={{ color: T.goldSoft, fontStyle: "italic" }}>· {tr}</span>
                  </div>
                  <div style={{ fontSize: 12, color: T.textDim, lineHeight: 1.5 }}>{note}</div>
                  {STROKES[l] && (
                    <div style={{ fontSize: 12, color: T.gold, lineHeight: 1.5, marginTop: 3 }}>
                      ✍️ {STROKES[l][1]}
                    </div>
                  )}
                </div>
                <div style={{ textAlign: "right", minWidth: 44 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: letterColor || T.textDim }}>{letterPct}%</div>
                  <div style={{ fontSize: 8.5, color: T.textDim, textTransform: "uppercase", letterSpacing: 0.4 }}>mastery</div>
                </div>
                <Speaker text={l} />
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                {[
                  ["iso", "iso"],
                  ["init", "ini"],
                  ["med", "med"],
                  ["fin", "fin"],
                ].map(([k, code]) => {
                  const ci = cellInfo(code);
                  return (
                    <div
                      key={k}
                      style={{
                        flex: 1,
                        textAlign: "center",
                        background: T.panelHi,
                        border: `1px solid ${T.line}`,
                        borderLeft: ci.color ? `3px solid ${ci.color}` : `1px solid ${T.line}`,
                        borderRadius: 9,
                        padding: "8px 2px",
                      }}
                    >
                      <div style={{ fontFamily: arFont, fontSize: 26, color: T.text, direction: "rtl", minHeight: 32 }}>
                        {ci.glyph}
                      </div>
                      <div style={{ fontSize: 9, color: T.textDim, marginTop: 3, textTransform: "uppercase", letterSpacing: 0.5 }}>
                        {k}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 3, marginTop: 3 }}>
                        <span style={{ width: 6, height: 6, borderRadius: 999, background: ci.color || T.line }} />
                        <span style={{ fontSize: 9, color: ci.pct == null ? T.textDim : T.text, fontWeight: 600 }}>{ci.pct == null ? "—" : ci.pct + "%"}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ fontFamily: displayFont, fontSize: 16, margin: "24px 0 10px", color: T.gold }}>
        Writing tips
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 9, fontSize: 13, lineHeight: 1.65 }}>
        <Note title="Letters join up">
          Most letters connect to the ones before and after, changing shape to fit. Write
          the skeleton of a word in one flowing stroke, then go back and add the dots.
        </Note>
        <Note title="Six one-way letters">
          <span style={{ fontFamily: arFont, fontSize: 20 }}>ا د ذ ر ز و</span> connect
          only on their right side — they never join to the letter that follows, so a
          word visibly “breaks” after them.
        </Note>
        <Note title="Taa marbuta — ة">
          A feminine ending written at the end of a word. It usually sounds like a soft
          “a”.
        </Note>
        <Note title="The word “the” — الـ">
          “el / il” attaches to the front of a word, e.g.{" "}
          <span style={{ fontFamily: arFont, fontSize: 18, direction: "rtl" }}>البيت</span>{" "}
          (<i>el-beet</i>, “the house”).
        </Note>
        <Note title="Short vowels (harakat)">
          Tiny marks above and below letters for a, i, u sounds. Everyday writing leaves
          them out, so you read them from context — which is exactly why drilling
          vocabulary pays off.
        </Note>
        <Note title="Texting informally (Franco-Arabic)">
          Egyptians often type in Latin letters, using numbers for sounds with no English
          letter: 3 = ع, 7 = ح, 2 = hamza/ق, 5 = خ, 6 = ط. So{" "}
          <span style={{ fontFamily: arFont, fontSize: 18, direction: "rtl" }}>عايز</span>{" "}
          (<i>ʿaayez</i>, “I want”) gets typed <b style={{ color: T.text }}>3ayez</b>.
        </Note>
      </div>

      <div style={{ fontSize: 11, color: T.textDim, textAlign: "center", marginTop: 20, lineHeight: 1.6 }}>
        Audio uses your device's built-in Arabic voice. If you hear nothing, your phone or
        browser may not have an Arabic voice installed — lean on the transliteration and
        the sound notes above.
      </div>
    </div>
  );
}

function Note({ title, children }) {
  return (
    <div
      style={{
        background: T.panel,
        border: `1px solid ${T.line}`,
        borderRadius: 12,
        padding: "11px 14px",
      }}
    >
      <div style={{ color: T.gold, fontWeight: 700, fontSize: 13, marginBottom: 4 }}>
        {title}
      </div>
      <div style={{ color: T.text }}>{children}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
